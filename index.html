<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東高３年 英単語やったんぞ サイト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー・ナビゲーション -->
  <header class="navbar">
    <div class="brand">東高３年 英単語やったんぞ</div>
    <nav>
      <a href="index.html" class="active">ホーム</a>
      <a href="study.html">学習</a>
      <a href="stats.html">統計</a>
    </nav>
  </header>

  <main class="container">

    <!-- ようこそセクション -->
    <div class="card">
      <div class="card-title">ようこそ！</div>
      <p>大学受験に向けた英単語学習アプリです。FSRS（Free Spaced Repetition Scheduler）アルゴリズムで、2233語を効率的に記憶できます。</p>
    </div>

    <!-- 学習範囲設定 -->
    <div class="card">
      <div class="card-title">学習範囲設定</div>

      <div id="range-form">
        <div class="form-group">
          <label for="range-name">範囲名：</label>
          <input type="text" id="range-name" placeholder="例：第1章 基礎単語">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="range-start">開始番号：</label>
            <input type="number" id="range-start" min="1" max="2233" value="1">
          </div>
          <div class="form-group">
            <label for="range-end">終了番号：</label>
            <input type="number" id="range-end" min="1" max="2233" value="100">
          </div>
        </div>
        <button id="save-range-btn" class="btn btn-primary btn-block mt-8" type="button">範囲を保存</button>
      </div>

      <div id="range-list" class="mt-16">
        <h3 class="mb-8">保存済み範囲</h3>
        <ul id="ranges-ul">
          <!-- 保存された範囲がここに表示される -->
        </ul>
        <p id="no-ranges-msg" class="text-muted text-sm">保存された範囲はありません。上のフォームから新しい範囲を作成してください。</p>
      </div>
    </div>

    <!-- 学習モード選択 -->
    <div class="card">
      <div class="card-title">学習モード選択</div>

      <div class="form-group">
        <label>出題方向：</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="study-mode" value="jp2en" checked>
            日本語→英語
          </label>
          <label>
            <input type="radio" name="study-mode" value="en2jp">
            英語→日本語
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="choice-count">選択肢数：</label>
        <div class="radio-group">
          <label><input type="radio" name="choice-count" value="4" checked>4択</label>
          <label><input type="radio" name="choice-count" value="5">5択</label>
          <label><input type="radio" name="choice-count" value="6">6択</label>
          <label><input type="radio" name="choice-count" value="7">7択</label>
          <label><input type="radio" name="choice-count" value="8">8択</label>
        </div>
      </div>

      <div class="form-group">
        <label for="retention-slider">目標定着率：<span id="retention-value">85%</span></label>
        <input type="range" id="retention-slider" min="70" max="97" value="85" step="1">
      </div>

      <button id="start-study-btn" class="btn btn-accent btn-block mt-16" type="button">学習開始</button>
    </div>

    <!-- 今日の学習サマリー -->
    <div class="card">
      <div class="card-title">今日の学習サマリー</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="num" id="due-count">0</div>
          <div class="label">復習カード</div>
        </div>
        <div class="summary-item">
          <div class="num" id="new-count">0</div>
          <div class="label">新規カード</div>
        </div>
        <div class="summary-item">
          <div class="num" id="studied-count">0</div>
          <div class="label">今日の学習済み</div>
        </div>
      </div>
    </div>

  </main>

  <footer class="text-center text-muted text-sm" style="padding:16px;">
    <p>東高３年 英単語やったんぞ サイト &copy; 2026</p>
  </footer>

  <script src="js/words.js"></script>
  <script src="js/fsrs.js"></script>
  <script>
    (function () {
      // --- 範囲管理 ---
      const RANGES_KEY = 'savedRanges';
      const SETTINGS_KEY = 'studySettings';
      const CARD_DATA_KEY = 'cardData';
      const SELECTED_RANGE_KEY = 'selectedRangeId';

      let selectedRangeId = localStorage.getItem(SELECTED_RANGE_KEY) || null;

      function loadRanges() {
        try {
          return JSON.parse(localStorage.getItem(RANGES_KEY)) || [];
        } catch (e) {
          return [];
        }
      }

      function saveRanges(ranges) {
        localStorage.setItem(RANGES_KEY, JSON.stringify(ranges));
      }

      function renderRanges() {
        const ranges = loadRanges();
        const ul = document.getElementById('ranges-ul');
        const noMsg = document.getElementById('no-ranges-msg');

        ul.innerHTML = '';

        if (ranges.length === 0) {
          noMsg.style.display = 'block';
          return;
        }

        noMsg.style.display = 'none';

        ranges.forEach(function (range) {
          const li = document.createElement('li');
          li.className = 'range-item' + (range.id === selectedRangeId ? ' selected' : '');
          li.innerHTML =
            '<div class="range-info">' +
              '<span class="range-name">' + escapeHtml(range.name) + '</span>' +
              '<span class="range-numbers">' + range.start + ' - ' + range.end + '</span>' +
            '</div>' +
            '<div class="range-actions">' +
              '<button class="select-range-btn" data-id="' + range.id + '">選択</button>' +
              '<button class="study-range-btn" data-id="' + range.id + '">学習する</button>' +
              '<button class="delete-range-btn" data-id="' + range.id + '">削除</button>' +
            '</div>';
          ul.appendChild(li);
        });

        // 選択ボタン
        ul.querySelectorAll('.select-range-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            selectedRangeId = this.getAttribute('data-id');
            localStorage.setItem(SELECTED_RANGE_KEY, selectedRangeId);
            renderRanges();
            updateSummary();
          });
        });

        // 学習するボタン
        ul.querySelectorAll('.study-range-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var rangeId = this.getAttribute('data-id');
            selectedRangeId = rangeId;
            localStorage.setItem(SELECTED_RANGE_KEY, selectedRangeId);
            startStudy(rangeId);
          });
        });

        // 削除ボタン
        ul.querySelectorAll('.delete-range-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var rangeId = this.getAttribute('data-id');
            if (confirm('この範囲を削除しますか？')) {
              var ranges = loadRanges().filter(function (r) { return r.id !== rangeId; });
              saveRanges(ranges);
              if (selectedRangeId === rangeId) {
                selectedRangeId = null;
                localStorage.removeItem(SELECTED_RANGE_KEY);
              }
              renderRanges();
              updateSummary();
            }
          });
        });
      }

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      // 新しい範囲を追加
      document.getElementById('save-range-btn').addEventListener('click', function () {
        var name = document.getElementById('range-name').value.trim();
        var start = parseInt(document.getElementById('range-start').value, 10);
        var end = parseInt(document.getElementById('range-end').value, 10);

        if (!name) {
          alert('範囲名を入力してください。');
          return;
        }
        if (isNaN(start) || isNaN(end) || start < 1 || end < 1 || start > 2233 || end > 2233) {
          alert('開始番号と終了番号は1から2233の間で入力してください。');
          return;
        }
        if (start > end) {
          alert('開始番号は終了番号以下にしてください。');
          return;
        }

        var ranges = loadRanges();
        var newRange = {
          id: Date.now().toString(),
          name: name,
          start: start,
          end: end
        };
        ranges.push(newRange);
        saveRanges(ranges);

        // フォームリセット
        document.getElementById('range-name').value = '';
        document.getElementById('range-start').value = '1';
        document.getElementById('range-end').value = '100';

        renderRanges();
      });

      // --- 学習モード設定 ---
      function loadSettings() {
        try {
          return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function applySettings() {
        var settings = loadSettings();

        if (settings.mode) {
          var modeRadio = document.querySelector('input[name="study-mode"][value="' + settings.mode + '"]');
          if (modeRadio) modeRadio.checked = true;
        }

        if (settings.choices) {
          var choiceRadio = document.querySelector('input[name="choice-count"][value="' + settings.choices + '"]');
          if (choiceRadio) choiceRadio.checked = true;
        }

        if (settings.retention !== undefined) {
          var slider = document.getElementById('retention-slider');
          slider.value = settings.retention;
          document.getElementById('retention-value').textContent = settings.retention + '%';
        }
      }

      // 定着率スライダー更新
      document.getElementById('retention-slider').addEventListener('input', function () {
        document.getElementById('retention-value').textContent = this.value + '%';
      });

      // 学習開始
      function startStudy(rangeId) {
        var mode = document.querySelector('input[name="study-mode"]:checked').value;
        var choices = document.querySelector('input[name="choice-count"]:checked').value;
        var retention = document.getElementById('retention-slider').value;

        // 設定を保存
        var settings = { mode: mode, choices: choices, retention: parseInt(retention, 10) };
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));

        var retentionDecimal = (parseInt(retention, 10) / 100).toFixed(2);
        var url = 'study.html?rangeId=' + encodeURIComponent(rangeId) +
                  '&mode=' + encodeURIComponent(mode) +
                  '&choices=' + encodeURIComponent(choices) +
                  '&retention=' + encodeURIComponent(retentionDecimal);
        window.location.href = url;
      }

      document.getElementById('start-study-btn').addEventListener('click', function () {
        if (!selectedRangeId) {
          alert('学習する範囲を選択してください。');
          return;
        }
        startStudy(selectedRangeId);
      });

      // --- 今日の学習サマリー ---
      function updateSummary() {
        var dueCount = 0;
        var newCount = 0;
        var studiedCount = 0;

        try {
          var cardData = JSON.parse(localStorage.getItem(CARD_DATA_KEY)) || {};
          var today = new Date().toISOString().slice(0, 10);

          if (selectedRangeId) {
            var ranges = loadRanges();
            var selectedRange = ranges.find(function (r) { return r.id === selectedRangeId; });

            if (selectedRange) {
              for (var i = selectedRange.start; i <= selectedRange.end; i++) {
                var card = cardData[i];
                if (!card) {
                  newCount++;
                } else {
                  if (card.lastReview && card.lastReview.slice(0, 10) === today) {
                    studiedCount++;
                  }
                  if (card.due) {
                    var dueDate = new Date(card.due);
                    if (dueDate <= new Date()) {
                      dueCount++;
                    }
                  }
                }
              }
            }
          }
        } catch (e) {
          // データ読み込みエラー時はゼロのまま
        }

        document.getElementById('due-count').textContent = dueCount;
        document.getElementById('new-count').textContent = newCount;
        document.getElementById('studied-count').textContent = studiedCount;
      }

      // --- 初期化 ---
      applySettings();
      renderRanges();
      updateSummary();
    })();
  </script>

</body>
</html>
