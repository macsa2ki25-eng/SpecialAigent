<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>えいごであそぼ!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Hiragino Maru Gothic Pro','Yu Gothic',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--pink:#FF6B9D;--yellow:#FFD93D;--blue:#6BC5F8;--green:#6BCB77;--purple:#C084FC;--orange:#FFA94D;--red:#FF6B6B;--bg:linear-gradient(135deg,#FFF5E4 0%,#FFE8F0 50%,#E8F4FD 100%)}
.screen{display:none;width:100%;height:100%;flex-direction:column;align-items:center;position:absolute;top:0;left:0;overflow-y:auto;background:var(--bg)}
.screen.active{display:flex}
/* Title */
#title-screen{justify-content:center;gap:20px}
.title-logo{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;color:var(--pink);text-shadow:3px 3px 0 var(--yellow);animation:bounce 2s ease-in-out infinite;text-align:center;line-height:1.3}
.title-sub{font-size:clamp(.9rem,3vw,1.3rem);color:#888}
.title-stars{font-size:clamp(1.2rem,3.5vw,1.6rem);color:var(--orange);font-weight:700}
.btn{font-size:clamp(1.1rem,3.5vw,1.5rem);padding:14px 40px;border:none;border-radius:50px;font-weight:700;cursor:pointer;transition:transform .15s;letter-spacing:1px}
.btn:active{transform:scale(.93)}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;box-shadow:0 4px 15px rgba(255,107,157,.4)}
.btn-secondary{background:#fff;color:var(--purple);box-shadow:0 4px 15px rgba(0,0,0,.08)}
.btn-green{background:linear-gradient(135deg,var(--green),#4CAF50);color:#fff;box-shadow:0 4px 15px rgba(107,203,119,.4)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 4px 15px rgba(107,197,248,.4)}
.nav-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:10px 0}
/* Category */
#category-screen{padding:20px;gap:15px;justify-content:flex-start;padding-top:40px}
.section-title{font-size:clamp(1.3rem,4.5vw,2rem);font-weight:800;color:var(--purple)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;width:100%;max-width:600px;padding:5px}
.cat-card{background:#fff;border-radius:20px;padding:16px 8px;text-align:center;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.07);transition:transform .15s;border:3px solid #eee}
.cat-card:active{transform:scale(.93)}
.cat-card .icon{font-size:2.5rem;display:block;margin-bottom:6px}
.cat-card .name{font-size:.95rem;font-weight:700;color:#555}
.cat-card:nth-child(1){border-color:var(--red)}.cat-card:nth-child(2){border-color:var(--blue)}.cat-card:nth-child(3){border-color:var(--green)}.cat-card:nth-child(4){border-color:var(--yellow)}.cat-card:nth-child(5){border-color:var(--purple)}.cat-card:nth-child(6){border-color:var(--orange)}.cat-card:nth-child(7){border-color:var(--pink)}
/* Level Select */
#level-screen{justify-content:center;gap:20px;padding:20px}
.level-cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px}
.level-card{background:#fff;border-radius:20px;padding:20px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.08);transition:transform .15s;border-left:6px solid var(--green);display:flex;align-items:center;gap:15px}
.level-card:active{transform:scale(.97)}
.level-card:nth-child(2){border-color:var(--orange)}
.level-card:nth-child(3){border-color:var(--red)}
.level-card .lv-icon{font-size:2rem}
.level-card .lv-info .lv-name{font-size:1.2rem;font-weight:700;color:#444}
.level-card .lv-info .lv-desc{font-size:.8rem;color:#999;margin-top:2px}
/* Game */
#game-screen{padding:12px;gap:8px;justify-content:flex-start;padding-top:15px}
.game-top{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center}
.back-btn{font-size:1.6rem;background:none;border:none;cursor:pointer;padding:6px}
.score-display{display:flex;align-items:center;gap:5px;font-size:1.2rem;font-weight:700;color:var(--orange)}
.progress-bg{width:100%;max-width:600px;height:10px;background:#fff;border-radius:5px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:5px;transition:width .4s}
.q-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;width:100%;max-width:600px}
.speak-btn{width:clamp(80px,20vw,110px);height:clamp(80px,20vw,110px);border-radius:50%;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:clamp(2rem,6vw,3rem);cursor:pointer;box-shadow:0 5px 20px rgba(107,197,248,.4);transition:transform .15s;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite}
.speak-btn:active{transform:scale(.9);animation:none}
.speak-hint{font-size:clamp(.8rem,2.2vw,1rem);color:#aaa;font-weight:600}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:500px}
.choices-grid.three-col{grid-template-columns:1fr 1fr 1fr}
.choice-card{background:#fff;border-radius:18px;padding:10px;text-align:center;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.07);transition:transform .15s;border:3px solid #eee;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.choice-card:active{transform:scale(.95)}
.choice-card .card-visual{font-size:clamp(1.8rem,5.5vw,2.8rem);line-height:1.1}
.choice-card .card-visual svg{width:60px;height:60px}
.choice-card .card-label{font-size:clamp(.65rem,1.8vw,.85rem);color:#bbb;font-weight:600}
.choice-card.correct{border-color:var(--green);background:#E8FFE8;animation:correctPop .5s ease}
.choice-card.wrong{border-color:var(--red);animation:shake .4s ease}
/* Result */
#result-screen{justify-content:center;gap:20px}
.result-stars{font-size:clamp(2rem,8vw,4rem);animation:bounce 1.5s ease-in-out infinite}
.result-msg{font-size:clamp(1.3rem,4.5vw,2rem);font-weight:800;color:var(--pink);text-align:center}
.result-score{font-size:clamp(1rem,3vw,1.4rem);color:#888;font-weight:700}
.result-earned{font-size:clamp(1rem,3vw,1.3rem);color:var(--orange);font-weight:700}
/* Shop */
#shop-screen{padding:15px;gap:12px;justify-content:flex-start;padding-top:20px}
.shop-header{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center}
.shop-stars{font-size:1.2rem;font-weight:700;color:var(--orange)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;width:100%;max-width:600px;padding-bottom:80px}
.shop-item{background:#fff;border-radius:16px;padding:10px 6px;text-align:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.06);transition:transform .15s;border:2px solid #eee;position:relative}
.shop-item:active{transform:scale(.95)}
.shop-item .item-icon{font-size:2rem;display:block;margin-bottom:4px}
.shop-item .item-icon svg{width:50px;height:50px;margin:0 auto;display:block}
.shop-item .item-name{font-size:.7rem;font-weight:600;color:#666;margin-bottom:3px}
.shop-item .item-price{font-size:.75rem;font-weight:700;color:var(--orange)}
.shop-item.owned{opacity:.5;border-color:var(--green)}
.shop-item.owned::after{content:'✓';position:absolute;top:4px;right:6px;color:var(--green);font-weight:900;font-size:.9rem}
/* Room */
#room-screen{padding:0;justify-content:flex-start}
.room-header{width:100%;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.8);z-index:10}
.room-container{width:100%;flex:1;position:relative;background:linear-gradient(180deg,#E8F4FD 0%,#FFF5E4 60%,#D4A574 60%,#C49A6C 100%);overflow:hidden;touch-action:none}
.room-item{position:absolute;cursor:grab;transition:none;z-index:5;font-size:2rem}
.room-item:active{cursor:grabbing;z-index:100}
.room-item svg{width:50px;height:50px;pointer-events:none}
.room-toolbar{position:absolute;bottom:0;width:100%;background:rgba(255,255,255,.95);border-top:2px solid #eee;padding:8px;display:flex;gap:8px;overflow-x:auto;z-index:20}
.room-tool-item{min-width:50px;height:50px;background:#f8f8f8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;border:2px solid #ddd;flex-shrink:0}
.room-tool-item:active{transform:scale(.9)}
.room-tool-item svg{width:35px;height:35px;pointer-events:none}
.delete-zone{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(255,107,107,.15);border:2px dashed var(--red);border-radius:16px;padding:8px 20px;color:var(--red);font-weight:700;font-size:.9rem;display:none;z-index:50}
.delete-zone.active{display:block}
/* Combo */
.combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:clamp(1.8rem,7vw,3rem);font-weight:900;color:var(--orange);text-shadow:2px 2px 0 var(--yellow);z-index:200;pointer-events:none;opacity:0}
.combo-display.show{animation:comboAppear .8s ease forwards}
/* Floating deco */
.floating-deco{position:fixed;pointer-events:none;z-index:0;opacity:.12;font-size:2.5rem;animation:floatAround 20s linear infinite}
/* Confetti */
.confetti{position:fixed;width:8px;height:8px;border-radius:2px;top:-10px;z-index:100;pointer-events:none;animation:confettiFall 2s ease-in forwards}
/* Animations */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
@keyframes comboAppear{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-80%) scale(.8);opacity:0}}
@keyframes floatAround{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(30px,-40px) rotate(90deg)}50%{transform:translate(-20px,-80px) rotate(180deg)}75%{transform:translate(40px,-40px) rotate(270deg)}100%{transform:translate(0,0) rotate(360deg)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeInUp .3s ease}
</style>
</head>
<body>
<!-- Title -->
<div id="title-screen" class="screen active">
<div class="title-logo">🌈 えいごで<br>あそぼ!</div>
<div class="title-sub">Let's Learn English!</div>
<div class="title-stars" id="title-stars">⭐ 0</div>
<div class="nav-row">
<button class="btn btn-primary" onclick="showScreen('category-screen')">▶ はじめる</button>
</div>
<div class="nav-row">
<button class="btn btn-green" onclick="showScreen('shop-screen');renderShop()">🛒 ショップ</button>
<button class="btn btn-blue" onclick="showScreen('room-screen');initRoom()">🏠 マイルーム</button>
</div>
</div>
<!-- Category -->
<div id="category-screen" class="screen">
<div class="section-title">なにを まなぶ？</div>
<div class="cat-grid" id="cat-grid"></div>
<button class="btn btn-secondary" onclick="showScreen('title-screen')" style="margin:10px 0 20px">🏠 もどる</button>
</div>
<!-- Level Select -->
<div id="level-screen" class="screen">
<div class="section-title" id="level-title">レベルをえらぼう</div>
<div class="level-cards" id="level-cards"></div>
<button class="btn btn-secondary" onclick="showScreen('category-screen')" style="margin-top:15px">◀ もどる</button>
</div>
<!-- Game -->
<div id="game-screen" class="screen">
<div class="game-top"><button class="back-btn" onclick="stopBGM();showScreen('category-screen')">🏠</button><div class="score-display">⭐ <span id="score">0</span></div></div>
<div class="progress-bg"><div class="progress-fill" id="progress-fill"></div></div>
<div class="q-area">
<button class="speak-btn" id="speak-btn" onclick="speakCurrent()">🔊</button>
<div class="speak-hint" id="speak-hint">タップして きいてみよう！</div>
<div class="choices-grid" id="choices-grid"></div>
</div>
</div>
<!-- Result -->
<div id="result-screen" class="screen">
<div class="result-stars" id="result-stars-display"></div>
<div class="result-msg" id="result-msg"></div>
<div class="result-score" id="result-score"></div>
<div class="result-earned" id="result-earned"></div>
<div class="nav-row">
<button class="btn btn-primary" onclick="retryGame()">🔄 もういちど</button>
<button class="btn btn-secondary" onclick="showScreen('category-screen')">📚 ほかの もんだい</button>
</div>
</div>
<!-- Shop -->
<div id="shop-screen" class="screen">
<div class="shop-header"><div class="section-title">🛒 ショップ</div><div class="shop-stars" id="shop-stars">⭐ 0</div></div>
<div class="shop-grid" id="shop-grid"></div>
<button class="btn btn-secondary" onclick="showScreen('title-screen')" style="position:fixed;bottom:15px;z-index:30">🏠 もどる</button>
</div>
<!-- Room -->
<div id="room-screen" class="screen">
<div class="room-header"><button class="btn btn-secondary" onclick="saveRoom();showScreen('title-screen')" style="padding:8px 20px;font-size:.9rem">🏠 もどる</button><span style="font-weight:700;color:#888">マイルーム</span><button class="btn btn-secondary" onclick="clearRoom()" style="padding:8px 16px;font-size:.8rem">🗑 リセット</button></div>
<div class="room-container" id="room-container"><div class="delete-zone" id="delete-zone">🗑 ここにはなす</div></div>
<div class="room-toolbar" id="room-toolbar"></div>
</div>
<!-- Combo -->
<div class="combo-display" id="combo-display"></div>
<!-- Deco -->
<div class="floating-deco" style="top:10%;left:5%">⭐</div>
<div class="floating-deco" style="top:60%;right:5%;animation-delay:-5s">🌸</div>
<div class="floating-deco" style="top:80%;left:10%;animation-delay:-10s">🎵</div>
<script>
// ===== Audio =====
let audioCtx;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(f,d,t='sine',v=.12){const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}
function sfxCorrect(){tone(523,.15);setTimeout(()=>tone(659,.15),100);setTimeout(()=>tone(784,.25),200)}
function sfxWrong(){tone(200,.3,'square',.06)}
function sfxResult(){[523,587,659,784,880,1047].forEach((n,i)=>setTimeout(()=>tone(n,.2),i*120))}
function sfxClick(){tone(880,.08,'sine',.08)}
let bgmI;
function startBGM(){stopBGM();const m=[392,440,494,523,494,440,392,330,349,392,440,392,349,330,294,330];let i=0;bgmI=setInterval(()=>{tone(m[i%m.length],.3,'sine',.025);i++},500)}
function stopBGM(){if(bgmI){clearInterval(bgmI);bgmI=null}}

// ===== Speech =====
function speak(text){return new Promise(r=>{if(!('speechSynthesis' in window)){r();return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.8;u.pitch=1.1;u.onend=r;u.onerror=r;const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'));if(v)u.voice=v;speechSynthesis.speak(u)})}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();speechSynthesis.getVoices()}

// ===== Star System =====
function getStars(){return parseInt(localStorage.getItem('eng_stars')||'0')}
function setStars(n){localStorage.setItem('eng_stars',String(n));document.getElementById('title-stars').textContent='⭐ '+n}
function addStars(n){setStars(getStars()+n)}
function getOwned(){return JSON.parse(localStorage.getItem('eng_owned')||'[]')}
function setOwned(arr){localStorage.setItem('eng_owned',JSON.stringify(arr))}
function getRoomData(){return JSON.parse(localStorage.getItem('eng_room')||'[]')}
function setRoomData(arr){localStorage.setItem('eng_room',JSON.stringify(arr))}

// ===== SVG Illustration Builders =====
function svgWrap(inner,w=100,h=100){return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`}
function svgPerson(x,y,hair='#5B3A29',shirt='#6BC5F8',sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><circle cx="0" cy="-20" r="12" fill="#FFD5B8"/><ellipse cx="0" cy="-24" rx="12" ry="8" fill="${hair}"/><circle cx="-4" cy="-20" r="1.5" fill="#333"/><circle cx="4" cy="-20" r="1.5" fill="#333"/><path d="M-3,-16 Q0,-14 3,-16" stroke="#FF8A80" fill="none" stroke-width="1.2"/><rect x="-8" y="-8" width="16" height="20" rx="4" fill="${shirt}"/><rect x="-6" y="12" width="5" height="14" rx="2" fill="#5C6BC0"/><rect x="1" y="12" width="5" height="14" rx="2" fill="#5C6BC0"/><rect x="-14" y="-6" width="6" height="3" rx="1.5" fill="#FFD5B8"/><rect x="8" y="-6" width="6" height="3" rx="1.5" fill="#FFD5B8"/></g>`}
function svgCat(x,y,color='#FF8A65',sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><ellipse cx="0" cy="5" rx="10" ry="8" fill="${color}"/><circle cx="0" cy="-8" r="8" fill="${color}"/><polygon points="-8,-14 -6,-4 -2,-10" fill="${color}"/><polygon points="8,-14 6,-4 2,-10" fill="${color}"/><circle cx="-3" cy="-9" r="1.5" fill="#333"/><circle cx="3" cy="-9" r="1.5" fill="#333"/><ellipse cx="0" cy="-6" rx="1.5" ry="1" fill="#FFB0B0"/><path d="M10,8 Q18,2 22,8" stroke="${color}" fill="none" stroke-width="2.5" stroke-linecap="round"/></g>`}
function svgDog(x,y,color='#A1887F',sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><ellipse cx="0" cy="5" rx="11" ry="8" fill="${color}"/><circle cx="0" cy="-8" r="9" fill="${color}"/><ellipse cx="-8" cy="-12" rx="4" ry="6" fill="#8D6E63"/><ellipse cx="8" cy="-12" rx="4" ry="6" fill="#8D6E63"/><circle cx="-3" cy="-8" r="1.5" fill="#333"/><circle cx="3" cy="-8" r="1.5" fill="#333"/><ellipse cx="0" cy="-5" rx="2" ry="1.5" fill="#333"/><path d="M-2,-3 Q0,-1.5 2,-3" stroke="#FF8A80" fill="none" stroke-width="1"/></g>`}
function svgBall(x,y,type='soccer',sc=1){
const c=type==='soccer'?'#fff':'#FF7043';
return `<g transform="translate(${x},${y}) scale(${sc})"><circle cx="0" cy="0" r="10" fill="${c}" stroke="#333" stroke-width="1"/>${type==='soccer'?'<path d="M-3,-8 L3,-8 L5,-3 L0,2 L-5,-3Z" fill="#333"/><path d="M-8,3 L-4,0 L-4,6Z" fill="#333"/><path d="M8,3 L4,0 L4,6Z" fill="#333"/>':''}</g>`}
function svgBook(x,y,color='#42A5F5',sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><rect x="-10" y="-12" width="20" height="24" rx="2" fill="${color}"/><rect x="-8" y="-10" width="16" height="20" rx="1" fill="#fff"/><line x1="-5" y1="-5" x2="5" y2="-5" stroke="#ddd" stroke-width="1"/><line x1="-5" y1="0" x2="5" y2="0" stroke="#ddd" stroke-width="1"/><line x1="-5" y1="5" x2="3" y2="5" stroke="#ddd" stroke-width="1"/></g>`}
function svgTree(x,y,sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><rect x="-3" y="5" width="6" height="12" rx="1" fill="#8D6E63"/><circle cx="0" cy="-2" r="12" fill="#66BB6A"/><circle cx="-7" cy="2" r="8" fill="#4CAF50"/><circle cx="7" cy="2" r="8" fill="#4CAF50"/></g>`}
function svgSun(x,y,sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><circle cx="0" cy="0" r="10" fill="#FFD93D"/><g stroke="#FFD93D" stroke-width="2" stroke-linecap="round">${[0,45,90,135,180,225,270,315].map(a=>`<line x1="0" y1="0" x2="${14*Math.cos(a*Math.PI/180)}" y2="${14*Math.sin(a*Math.PI/180)}" />`).join('')}</g></g>`}
function svgHouse(x,y,sc=1){
return `<g transform="translate(${x},${y}) scale(${sc})"><rect x="-15" y="-5" width="30" height="22" rx="2" fill="#FFCC80"/><polygon points="-18,-5 0,-20 18,-5" fill="#EF5350"/><rect x="-4" y="3" width="8" height="14" rx="1" fill="#8D6E63"/><rect x="-12" y="0" width="6" height="6" rx="1" fill="#B3E5FC"/><rect x="6" y="0" width="6" height="6" rx="1" fill="#B3E5FC"/></g>`}
function svgSchool(x,y,sc=1){

// ===== Game State =====
let curCat=null,curLevel=1,curQs=[],curQIdx=0,gameScore=0,combo=0,totalQ=5,isAns=false,earnedStars=0;
const levels=[
  {lv:1,name:'かんたん',desc:'ようち〜ていがくねん',icon:'🌱',choices:4,qCount:5},
  {lv:2,name:'ふつう',desc:'ていがくねん〜ちゅうがくねん',icon:'🌿',choices:4,qCount:7},
  {lv:3,name:'むずかしい',desc:'ちゅう〜こうがくねん',icon:'🌳',choices:6,qCount:8},
];

// ===== Screen =====
function showScreen(id){
  sfxClick();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='title-screen'){stopBGM();document.getElementById('title-stars').textContent='⭐ '+getStars()}
}

// ===== Category Grid =====
function buildCatGrid(){
  const g=document.getElementById('cat-grid');g.innerHTML='';
  categories.forEach(c=>{
    const d=document.createElement('div');d.className='cat-card';
    d.innerHTML=`<span class="icon">${c.icon}</span><span class="name">${c.name}</span>`;
    d.onclick=()=>showLevelSelect(c.id);
    g.appendChild(d);
  });
}

// ===== Level Select =====
function showLevelSelect(catId){
  sfxClick();curCat=categories.find(c=>c.id===catId);
  document.getElementById('level-title').textContent=curCat.name+' - レベル';
  const lc=document.getElementById('level-cards');lc.innerHTML='';
  levels.forEach(l=>{
    // Check if category has words for this level
    const hasWords=curCat.words.filter(w=>w.lv<=l.lv).length>=l.choices;
    const d=document.createElement('div');d.className='level-card';
    if(!hasWords){d.style.opacity='.4';d.style.pointerEvents='none'}
    d.innerHTML=`<span class="lv-icon">${l.icon}</span><div class="lv-info"><div class="lv-name">${l.name}</div><div class="lv-desc">${l.desc}</div></div>`;
    d.onclick=()=>startGame(l.lv);
    lc.appendChild(d);
  });
  showScreen('level-screen');
}

// ===== Start Game =====
function startGame(lv){
  sfxClick();curLevel=lv;
  const lvCfg=levels.find(l=>l.lv===lv);
  totalQ=lvCfg.qCount;gameScore=0;combo=0;curQIdx=0;earnedStars=0;
  document.getElementById('score').textContent='0';

  // Words available up to this level
  const pool=curCat.words.filter(w=>w.lv<=lv);
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  curQs=shuffled.slice(0,Math.min(totalQ,shuffled.length));
  showScreen('game-screen');startBGM();showQuestion();
}

function showQuestion(){
  isAns=false;
  const q=curQs[curQIdx];
  const lvCfg=levels.find(l=>l.lv===curLevel);
  document.getElementById('progress-fill').style.width=(curQIdx/curQs.length*100)+'%';

  // Hint text
  const hint=document.getElementById('speak-hint');
  hint.textContent=curLevel>=3?'Listen and choose!':'タップして きいてみよう！';

  // Choices
  const pool=curCat.words.filter(w=>w.lv<=curLevel);
  const numChoices=lvCfg.choices;
  const wrong=pool.filter(w=>w.en!==q.en).sort(()=>Math.random()-.5).slice(0,numChoices-1);
  const choices=[q,...wrong].sort(()=>Math.random()-.5);

  const grid=document.getElementById('choices-grid');
  grid.innerHTML='';
  grid.className='choices-grid'+(numChoices>=6?' three-col':'');

  choices.forEach(ch=>{
    const card=document.createElement('div');card.className='choice-card';
    // Use SVG for sentence category, emoji for others
    let visual;
    if(ch.svg && sentenceSVGs[ch.svg]){
      visual=sentenceSVGs[ch.svg];
    } else {
      visual=ch.emoji||'';
    }
    const isHtml=visual.startsWith('<');
    card.innerHTML=`<span class="card-visual">${isHtml?visual:visual}</span><span class="card-label">${ch.ja}</span>`;
    card.onclick=()=>handleAnswer(card,ch,q);
    grid.appendChild(card);
  });

  setTimeout(()=>speak(q.en),400);
}

function speakCurrent(){
  if(curQs[curQIdx]){sfxClick();
    const b=document.getElementById('speak-btn');b.style.transform='scale(1.15)';setTimeout(()=>b.style.transform='',200);
    speak(curQs[curQIdx].en);
  }
}

function handleAnswer(card,chosen,correct){
  if(isAns)return;isAns=true;
  if(chosen.en===correct.en){
    card.classList.add('correct');combo++;
    const pts=combo>=3?20:10;gameScore+=pts;
    document.getElementById('score').textContent=gameScore;
    sfxCorrect();
    if(combo>=3){showCombo(combo);spawnConfetti(8)}
    speak(correct.en).then(()=>setTimeout(nextQ,350));
  }else{
    card.classList.add('wrong');combo=0;sfxWrong();
    document.querySelectorAll('.choice-card').forEach(c=>{
      const lbl=c.querySelector('.card-label');
      if(lbl&&lbl.textContent===correct.ja)setTimeout(()=>c.classList.add('correct'),300);
    });
    speak(correct.en).then(()=>setTimeout(nextQ,700));
  }
}

function nextQ(){curQIdx++;curQIdx>=curQs.length?showResult():showQuestion()}

function showResult(){
  stopBGM();sfxResult();
  const maxPts=curQs.length*10;
  const pct=gameScore/maxPts;
  let stars,msg;
  if(pct>=1.5){stars='🌟🌟🌟';msg='すごーい！パーフェクト！';earnedStars=curLevel*5}
  else if(pct>=1){stars='⭐⭐⭐';msg='とってもよくできました！';earnedStars=curLevel*4}
  else if(pct>=.6){stars='⭐⭐';msg='よくがんばったね！';earnedStars=curLevel*2}
  else{stars='⭐';msg='もういちど チャレンジ！';earnedStars=curLevel}

  addStars(earnedStars);
  document.getElementById('result-stars-display').textContent=stars;
  document.getElementById('result-msg').textContent=msg;
  document.getElementById('result-score').textContent=`スコア: ${gameScore}てん`;
  document.getElementById('result-earned').textContent=`⭐ +${earnedStars} ゲット！（もちもの: ${getStars()}）`;
  showScreen('result-screen');spawnConfetti(20);
}

function retryGame(){if(curCat)startGame(curLevel)}

// ===== Shop =====
function renderShop(){
  const g=document.getElementById('shop-grid');g.innerHTML='';
  const owned=getOwned();
  document.getElementById('shop-stars').textContent='⭐ '+getStars();
  shopItems.forEach(item=>{
    const d=document.createElement('div');d.className='shop-item';
    if(owned.includes(item.id))d.classList.add('owned');
    const iconHtml=item.svg||item.icon;
    d.innerHTML=`<span class="item-icon">${iconHtml}</span><span class="item-name">${item.name}</span><span class="item-price">${owned.includes(item.id)?'もってる':'⭐ '+item.price}</span>`;
    d.onclick=()=>buyItem(item);
    g.appendChild(d);
  });
}

function buyItem(item){
  const owned=getOwned();
  if(owned.includes(item.id))return;
  const stars=getStars();
  if(stars<item.price){
    alert('⭐がたりないよ！あと '+(item.price-stars)+' こ ひつよう！');return;
  }
  if(!confirm(`${item.name}を ⭐${item.price}こで かう？`))return;
  sfxCorrect();setStars(stars-item.price);owned.push(item.id);setOwned(owned);renderShop();spawnConfetti(10);
}

// ===== Room =====
let roomItems=[];
let dragItem=null,dragOfsX=0,dragOfsY=0,isDragging=false;

function initRoom(){
  roomItems=getRoomData();
  renderRoom();renderToolbar();
}

function renderRoom(){
  const c=document.getElementById('room-container');
  // Remove old room-item elements
  c.querySelectorAll('.room-item').forEach(e=>e.remove());
  roomItems.forEach((ri,idx)=>{
    const si=shopItems.find(s=>s.id===ri.id);if(!si)return;
    const el=document.createElement('div');el.className='room-item';el.dataset.idx=idx;
    el.innerHTML=si.svg||si.icon;
    el.style.left=ri.x+'px';el.style.top=ri.y+'px';
    addDragListeners(el);
    c.appendChild(el);
  });
}

function renderToolbar(){
  const tb=document.getElementById('room-toolbar');tb.innerHTML='';
  const owned=getOwned();
  owned.forEach(id=>{
    const si=shopItems.find(s=>s.id===id);if(!si)return;
    const d=document.createElement('div');d.className='room-tool-item';
    d.innerHTML=si.svg||si.icon;
    d.onclick=()=>addToRoom(si);
    tb.appendChild(d);
  });
  if(owned.length===0){
    tb.innerHTML='<div style="padding:10px;color:#aaa;font-size:.85rem">ショップでアイテムをかおう！</div>';
  }
}

function addToRoom(si){
  sfxClick();
  const c=document.getElementById('room-container');
  const rect=c.getBoundingClientRect();
  roomItems.push({id:si.id,x:rect.width/2-25,y:rect.height/2-25});
  saveRoom();renderRoom();
}

function saveRoom(){setRoomData(roomItems)}

function clearRoom(){
  if(!confirm('へやをリセットする？'))return;
  roomItems=[];saveRoom();renderRoom();
}

function addDragListeners(el){
  // Touch
  el.addEventListener('touchstart',e=>{
    e.preventDefault();isDragging=true;dragItem=el;
    const t=e.touches[0],r=el.getBoundingClientRect();
    dragOfsX=t.clientX-r.left;dragOfsY=t.clientY-r.top;
    el.style.zIndex=100;
    document.getElementById('delete-zone').classList.add('active');
  },{passive:false});
  el.addEventListener('touchmove',e=>{
    if(!isDragging||dragItem!==el)return;e.preventDefault();
    const t=e.touches[0],c=document.getElementById('room-container'),cr=c.getBoundingClientRect();
    let nx=t.clientX-cr.left-dragOfsX,ny=t.clientY-cr.top-dragOfsY;
    nx=Math.max(0,Math.min(nx,cr.width-50));ny=Math.max(0,Math.min(ny,cr.height-80));
    el.style.left=nx+'px';el.style.top=ny+'px';
  },{passive:false});
  el.addEventListener('touchend',e=>{
    if(!isDragging||dragItem!==el)return;
    finishDrag(el,e.changedTouches[0]);
  });
  // Mouse
  el.addEventListener('mousedown',e=>{
    isDragging=true;dragItem=el;
    dragOfsX=e.offsetX;dragOfsY=e.offsetY;
    el.style.zIndex=100;
    document.getElementById('delete-zone').classList.add('active');
  });
}

document.addEventListener('mousemove',e=>{
  if(!isDragging||!dragItem)return;
  const c=document.getElementById('room-container'),cr=c.getBoundingClientRect();
  let nx=e.clientX-cr.left-dragOfsX,ny=e.clientY-cr.top-dragOfsY;
  nx=Math.max(0,Math.min(nx,cr.width-50));ny=Math.max(0,Math.min(ny,cr.height-80));
  dragItem.style.left=nx+'px';dragItem.style.top=ny+'px';
});

document.addEventListener('mouseup',e=>{
  if(!isDragging||!dragItem)return;
  finishDrag(dragItem,e);
});

function finishDrag(el,evt){
  isDragging=false;el.style.zIndex=5;
  document.getElementById('delete-zone').classList.remove('active');
  const idx=parseInt(el.dataset.idx);
  // Check if dropped on delete zone
  const dz=document.getElementById('delete-zone'),dzr=dz.getBoundingClientRect();
  const cx=evt.clientX||evt.pageX,cy=evt.clientY||evt.pageY;
  if(cx>=dzr.left&&cx<=dzr.right&&cy>=dzr.top&&cy<=dzr.bottom){
    roomItems.splice(idx,1);saveRoom();renderRoom();sfxClick();return;
  }
  // Save position
  if(roomItems[idx]){
    roomItems[idx].x=parseInt(el.style.left);
    roomItems[idx].y=parseInt(el.style.top);
    saveRoom();
  }
  dragItem=null;
}

// ===== Effects =====
function spawnConfetti(n){
  const cs=['#FF6B9D','#FFD93D','#6BC5F8','#6BCB77','#C084FC','#FFA94D'];
  for(let i=0;i<n;i++){const e=document.createElement('div');e.className='confetti';
    e.style.left=Math.random()*100+'vw';e.style.background=cs[Math.floor(Math.random()*cs.length)];
    e.style.animationDuration=(1.5+Math.random())+'s';e.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
}
function showCombo(n){
  const e=document.getElementById('combo-display');e.textContent=n+'コンボ！🔥';
  e.classList.remove('show');void e.offsetWidth;e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),1000);
}

// ===== Init =====
buildCatGrid();
document.getElementById('title-stars').textContent='⭐ '+getStars();
</script>
