<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌈 えいごであそぼ!</title>
<style>
/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Rounded Mplus 1c', 'Hiragino Maru Gothic Pro', 'Yu Gothic', sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ===== CSS Variables ===== */
:root {
  --pink: #FF6B9D;
  --yellow: #FFD93D;
  --blue: #6BC5F8;
  --green: #6BCB77;
  --purple: #C084FC;
  --orange: #FFA94D;
  --red: #FF6B6B;
  --bg-gradient: linear-gradient(135deg, #FFF5E4 0%, #FFE8F0 50%, #E8F4FD 100%);
}

/* ===== Screens ===== */
.screen {
  display: none;
  width: 100%; height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: absolute;
  top: 0; left: 0;
}
.screen.active { display: flex; }

/* ===== Title Screen ===== */
#title-screen {
  background: var(--bg-gradient);
  gap: 30px;
}
.title-logo {
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900;
  color: var(--pink);
  text-shadow: 3px 3px 0 var(--yellow), 6px 6px 0 rgba(0,0,0,.08);
  animation: bounce 2s ease-in-out infinite;
  text-align: center;
  line-height: 1.3;
}
.title-sub {
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: #888;
}
.start-btn {
  font-size: clamp(1.4rem, 4vw, 2rem);
  padding: 18px 60px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,157,.4);
  transition: transform .15s;
  letter-spacing: 2px;
}
.start-btn:active { transform: scale(.93); }

/* ===== Category Screen ===== */
#category-screen {
  background: var(--bg-gradient);
  gap: 20px;
  padding: 20px;
}
.category-title {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  color: var(--purple);
  font-weight: 800;
}
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 600px;
  padding: 10px;
}
.category-card {
  background: #fff;
  border-radius: 24px;
  padding: 20px 10px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
  transition: transform .15s;
  border: 3px solid transparent;
}
.category-card:active { transform: scale(.93); }
.category-card .emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
.category-card .label {
  font-size: 1.1rem;
  font-weight: 700;
  color: #555;
}
.category-card:nth-child(1) { border-color: var(--red); }
.category-card:nth-child(2) { border-color: var(--blue); }
.category-card:nth-child(3) { border-color: var(--green); }
.category-card:nth-child(4) { border-color: var(--yellow); }
.category-card:nth-child(5) { border-color: var(--purple); }
.category-card:nth-child(6) { border-color: var(--orange); }

/* ===== Game Screen ===== */
#game-screen {
  background: var(--bg-gradient);
  padding: 15px;
  gap: 10px;
}
.game-top {
  width: 100%;
  max-width: 600px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.back-btn {
  font-size: 1.8rem;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
}
.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--orange);
}
.progress-bar-bg {
  width: 100%;
  max-width: 600px;
  height: 12px;
  background: #fff;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,.08);
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 6px;
  transition: width .4s ease;
}

.question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  width: 100%;
  max-width: 600px;
}
.speak-btn {
  width: clamp(100px, 25vw, 140px);
  height: clamp(100px, 25vw, 140px);
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff;
  font-size: clamp(2.5rem, 8vw, 4rem);
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(107,197,248,.4);
  transition: transform .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 2s ease-in-out infinite;
}
.speak-btn:active { transform: scale(.9); animation: none; }
.speak-hint {
  font-size: clamp(.9rem, 2.5vw, 1.2rem);
  color: #aaa;
  font-weight: 600;
}

.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  max-width: 500px;
}
.choice-card {
  background: #fff;
  border-radius: 20px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
  transition: transform .15s, box-shadow .15s;
  border: 4px solid #eee;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.choice-card:active { transform: scale(.95); }
.choice-card .card-emoji {
  font-size: clamp(2.2rem, 7vw, 3.5rem);
  line-height: 1.2;
}
.choice-card .card-label {
  font-size: clamp(.7rem, 2vw, .95rem);
  color: #bbb;
  font-weight: 600;
}
.choice-card.correct {
  border-color: var(--green);
  background: #E8FFE8;
  animation: correctPop .5s ease;
}
.choice-card.wrong {
  border-color: var(--red);
  animation: shake .4s ease;
}

/* ===== Result Screen ===== */
#result-screen {
  background: var(--bg-gradient);
  gap: 24px;
}
.result-stars {
  font-size: clamp(2.5rem, 10vw, 5rem);
  animation: bounce 1.5s ease-in-out infinite;
}
.result-msg {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  font-weight: 800;
  color: var(--pink);
  text-align: center;
}
.result-score {
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  color: #888;
  font-weight: 700;
}
.result-btns {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.result-btn {
  font-size: clamp(1rem, 3vw, 1.3rem);
  padding: 14px 36px;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .15s;
}
.result-btn:active { transform: scale(.93); }
.result-btn.primary {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  box-shadow: 0 4px 15px rgba(255,107,157,.3);
}
.result-btn.secondary {
  background: #fff;
  color: var(--purple);
  box-shadow: 0 4px 15px rgba(0,0,0,.08);
}

/* ===== Floating decorations ===== */
.floating-deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: .15;
  font-size: 3rem;
  animation: floatAround 20s linear infinite;
}

/* ===== Confetti ===== */
.confetti {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  top: -10px;
  z-index: 100;
  pointer-events: none;
  animation: confettiFall 2s ease-in forwards;
}

/* ===== Combo display ===== */
.combo-display {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900;
  color: var(--orange);
  text-shadow: 2px 2px 0 var(--yellow);
  z-index: 200;
  pointer-events: none;
  opacity: 0;
}
.combo-display.show {
  animation: comboAppear .8s ease forwards;
}

/* ===== Animations ===== */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 6px 25px rgba(107,197,248,.4); }
  50% { transform: scale(1.05); box-shadow: 0 8px 35px rgba(107,197,248,.6); }
}
@keyframes correctPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}
@keyframes comboAppear {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -80%) scale(.8); opacity: 0; }
}
@keyframes floatAround {
  0% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(30px, -40px) rotate(90deg); }
  50% { transform: translate(-20px, -80px) rotate(180deg); }
  75% { transform: translate(40px, -40px) rotate(270deg); }
  100% { transform: translate(0, 0) rotate(360deg); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Screen transitions */
.screen { animation: fadeInUp .4s ease; }
</style>
</head>

<script>
// ===== Audio Context & Sound Generation =====
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.15) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function playCorrectSound() {
  playTone(523, 0.15, 'sine', 0.12);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.12), 100);
  setTimeout(() => playTone(784, 0.25, 'sine', 0.12), 200);
}

function playWrongSound() {

}

function playResultSound() {
  const notes = [523, 587, 659, 784, 880, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sine', 0.1), i * 120));
}

function playClickSound() {

// Simple BGM using oscillator loop
let bgmInterval;
function startBGM() {

  let i = 0;
  bgmInterval = setInterval(() => {
    playTone(melody[i % melody.length], 0.3, 'sine', 0.03);
    i++;
  }, 500);
}
function stopBGM() {
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// ===== Word Data =====

// ===== Game State =====
let currentCategory = null;
let currentQuestions = [];
let currentQuestionIdx = 0;
let score = 0;
let combo = 0;
let totalQuestions = 5;
let isAnswering = false;

// ===== Speech Synthesis =====
function speak(text, lang = 'en-US') {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.8;
    u.pitch = 1.1;
    u.onend = resolve;
    u.onerror = resolve;
    // Attempt to find English voice
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) u.voice = enVoice;
    speechSynthesis.speak(u);
  });
}

// Load voices
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}

// ===== Screen Management =====
function showScreen(id) {
  playClickSound();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if (id === 'title-screen') {
    stopBGM();
  }
}

// ===== Category Setup =====
function buildCategoryGrid() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.innerHTML = `<span class="emoji">${cat.emoji}</span><span class="label">${cat.name}</span>`;
    card.onclick = () => startGame(cat.id);
    grid.appendChild(card);
  });
}

// ===== Game Logic =====
function startGame(categoryId) {
  playClickSound();
  currentCategory = categories.find(c => c.id === categoryId);
  score = 0;
  combo = 0;
  currentQuestionIdx = 0;
  document.getElementById('score').textContent = '0';

  // Pick random questions
  const shuffled = [...currentCategory.words].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, totalQuestions);

  showScreen('game-screen');
  startBGM();
  showQuestion();
}

function showQuestion() {
  isAnswering = false;
  const q = currentQuestions[currentQuestionIdx];
  const allWords = currentCategory.words;

  // Progress bar
  document.getElementById('progress-fill').style.width =
    ((currentQuestionIdx) / totalQuestions * 100) + '%';

  // Generate 4 choices (1 correct + 3 wrong)
  const wrongChoices = allWords
    .filter(w => w.en !== q.en)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3);

  const choices = [q, ...wrongChoices].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(choice => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = `<span class="card-emoji">${choice.emoji}</span><span class="card-label">${choice.ja}</span>`;
    card.onclick = () => handleAnswer(card, choice, q);
    grid.appendChild(card);
  });

  // Auto speak
  setTimeout(() => speak(q.en), 500);
}

function speakCurrentWord() {
  if (currentQuestions[currentQuestionIdx]) {
    playClickSound();
    const btn = document.getElementById('speak-btn');
    btn.style.transform = 'scale(1.15)';
    setTimeout(() => btn.style.transform = '', 200);
    speak(currentQuestions[currentQuestionIdx].en);
  }
}

function handleAnswer(card, chosen, correct) {
  if (isAnswering) return;
  isAnswering = true;

  if (chosen.en === correct.en) {
    // Correct!
    card.classList.add('correct');
    combo++;
    const points = combo >= 3 ? 20 : 10;
    score += points;
    document.getElementById('score').textContent = score;

    playCorrectSound();

    // Combo display
    if (combo >= 3) {
      showCombo(combo);
      spawnConfetti(8);
    }

    // Show the word briefly
    speak(correct.en).then(() => {
      setTimeout(nextQuestion, 400);
    });
  } else {
    // Wrong
    card.classList.add('wrong');
    combo = 0;
    playWrongSound();

    // Highlight correct answer
    const cards = document.querySelectorAll('.choice-card');
    cards.forEach(c => {
      if (c.querySelector('.card-emoji').textContent === correct.emoji) {
        setTimeout(() => c.classList.add('correct'), 300);
      }
    });

    speak(correct.en).then(() => {
      setTimeout(nextQuestion, 800);
    });
  }
}

function nextQuestion() {
  currentQuestionIdx++;
  if (currentQuestionIdx >= totalQuestions) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  stopBGM();
  playResultSound();

  const pct = score / (totalQuestions * 10);
  let stars, msg;
  if (pct >= 1.5) { stars = '🌟🌟🌟'; msg = 'すごーい！パーフェクト！'; }
  else if (pct >= 1) { stars = '⭐⭐⭐'; msg = 'とってもよくできました！'; }
  else if (pct >= 0.6) { stars = '⭐⭐'; msg = 'よくがんばったね！'; }
  else { stars = '⭐'; msg = 'もういちど チャレンジ！'; }

  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-score').textContent = `スコア: ${score}てん`;

  showScreen('result-screen');
  spawnConfetti(20);
}

function retryCategory() {
  if (currentCategory) startGame(currentCategory.id);
}

// ===== Effects =====
function spawnConfetti(count) {
  const colors = ['#FF6B9D', '#FFD93D', '#6BC5F8', '#6BCB77', '#C084FC', '#FFA94D'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random()) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

function showCombo(n) {
  const el = document.getElementById('combo-display');
  el.textContent = `${n}コンボ！🔥`;
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

// ===== Init =====
buildCategoryGrid();
</script>
</body>
</html>
