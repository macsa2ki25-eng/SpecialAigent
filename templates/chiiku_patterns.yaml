# 知育投稿の「型」集 - 主婦目線・ママ層ターゲット
#
# generator.py が --pattern で指定。デフォルトは tip (メイン)。
# 各投稿は単発（スレッドではない）、140字以内、URL/絵文字/ハッシュタグなし。

patterns:

  - id: tip
    name: Tip型「これで○○が自然に身につく」
    description: 学びになる活動を、メリットを切り口に紹介する型。タイプ2、メイン型。
    structure: |
      1行目: 結論先出し or 「○○には〇〇が効く」のフック
        例: 「足し算ドリルより◯◯のほうが速い」
        例: 「うちの子、HPの計算が楽しくて止まらない」
      2-3行目: なぜそうなのかを具体例 or 数字で
      最後: 教育者ぶらない、「気づいたら覚えてた」程度の柔らかい締め
    constraints: |
      - 140文字以内 厳守
      - 「学習教材買おう」「ドリル買おう」のような商業誘導はしない
      - 「上から教える」感を出さない、フラットな目線
      - 専門用語は使わない（主婦読者を想定）
      - ハッシュタグ・絵文字・URLなし
      - 「子供」より「うちの子」「うちの息子/娘」など親しみやすい主語

  - id: experience
    name: 体験談型「うちは〇〇で△△を教えてる」
    description: 我が家のリアル体験ベース。タイプ1、サブ型。
    structure: |
      1行目: 「うちは〇〇で〇〇を教えてる」 or 「〇〇のために〇〇始めた」
      2-3行目: 具体的な日常シーンの描写
      4-5行目: そこで起きた変化や気づき
      最後: 余韻、または読者への小さな問いかけ
    constraints: |
      - 140文字以内 厳守
      - 自慢にならない、押し付けない
      - 「うちの場合」と限定して語る
      - 教育論を振りかざさない
      - ハッシュタグ・絵文字・URLなし
