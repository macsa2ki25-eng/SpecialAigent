# 知育投稿の「型」集 - 主婦目線・ママ層ターゲット
#
# generator.py が --pattern で指定。デフォルトは tip (メイン)。
# 各投稿は単発（スレッドではない）、140字以内、URL/絵文字/ハッシュタグなし。

patterns:

  - id: tip
    name: Tip型「これで○○が自然に身につく」
    description: 学びになる活動を、メリットを切り口に紹介する型。タイプ2、メイン型。
    structure: |
      1行目: ママ友に「ねえ、これ知ってた?」って話しかけるトーンの引き
        例: 「足し算ドリルやらせるより◯◯のほうが効くって最近気づいた」
        例: 「うちの息子、◯◯始めてから△△がヤバい(親バカ)」
        例: 「これ、ぐうたらママほど効く知育だわ」
      2-3行目: なぜそうなるかを具体例 or 数字で。感情(「えっ」「びっくり」「やば」)を混ぜる
      最後: 「気づいたら覚えてた」みたいなフラットな締め、または自虐
        例: 「もっと早く知りたかった...」
        例: 「親が必死にならないほうが伸びる説」
    constraints: |
      - 140文字以内 厳守
      - 「学習教材買おう」「ドリル買おう」のような商業誘導はしない
      - 「上から教える」感を出さない、フラット&カジュアルに
      - ハッシュタグ・絵文字・URLなし
      - 「子供」より「うちの子」「うちの息子/娘」「ママ友」など親しみワード
      - 「〜である」「〜だ」「〜と思った」は連発しない
      - ママ友LINEのノリで、感情ワード(「えっ」「これマジ」「親バカ」「びっくり」)を散りばめる

  - id: experience
    name: 体験談型「うちは〇〇で△△を教えてる」
    description: 我が家のリアル体験ベース。タイプ1、サブ型。
    structure: |
      1行目: ママ友に近況報告するノリで「うちはこうしてるよ」
        例: 「うちは雨の日のヒマつぶしにポケカ。気づいたら算数が...」
        例: 「最近ハマってる知育、ポケカなんだけど想像以上に効いてる」
      2-3行目: 具体的な日常シーンの描写。感情入れる
      4-5行目: そこで起きた変化や気づき、ちょっとした驚き
      最後: 余韻、または読者への小さな問いかけ
        例: 「みんな何で教えてる?」
        例: 「もっと早くやってればよかった...」
    constraints: |
      - 140文字以内 厳守
      - 自慢にならない、押し付けない
      - 「うちの場合」と限定して語る
      - 教育論を振りかざさない
      - ハッシュタグ・絵文字・URLなし
      - ママ友LINEトーン、硬い書き言葉NG
