# X (旧Twitter) 投稿の「型」集 - 体験談ベースの物販レビュー特化
#
# 1つの商品から、これらの型を切り替えて複数アングルの投稿を生成可能。
# 例: 同じ「ネコソギ」でも problem_solving 型と before_after 型で2投稿作れる。
#
# generator.py が --angle <id> で指定して使う。
# --angle 未指定なら、まだ使ってない型を自動選択。

patterns:

  - id: problem_solving
    name: 問題解決体験型
    description: 「困ってた→これで解決」の王道パターン。共感→解決の流れ。
    structure: |
      1行目: 「〜で困ってた人いる？」or「〜地獄が終わった話」
      2-3行目: どれだけ困っていたか（具体的なあるある）
      4-5行目: 解決策との出会い（商品名は強調しすぎず）
      最後: ビフォーアフターの具体的差分 + 一言の余韻
    constraints: |
      - 140文字以内
      - 商品名は1回だけ自然に出す
      - 「買ってください」「リンク貼っときます」など販促語はNG
      - リプライ側でブログURLを案内する想定なので、本文ではURL言及しない

  - id: before_after
    name: ビフォーアフター型
    description: 数字や時間のギャップを強調する型。インパクト重視。
    structure: |
      1行目: 「Before: 〜 / After: 〜」 or「〇日で〜が変わった」
      2-3行目: ビフォーの状況（短く、感情込めて）
      4-5行目: アフターの状況（数字で）
      最後: 一言で締める
    constraints: |
      - 140文字以内
      - 数字を必ず入れる（日数、回数、金額など）
      - 過大表現は避ける、実体験ベース

  - id: honest_review
    name: 正直レビュー型
    description: 「ぶっちゃけ」「正直に言う」系。ステマ感を消す。
    structure: |
      1行目: 「正直に言うと〜」「ぶっちゃけ〜」
      2-3行目: 良い点（具体的に）
      4-5行目: 微妙な点 or 注意点（あえて1つ入れる）
      最後: 「それでも買ってよかった」系の肯定
    constraints: |
      - 140文字以内
      - 必ず「微妙な点」を1つ入れる（信頼性UP）
      - 微妙な点は致命的でないもの（「重い」「箱がデカい」程度）

  - id: late_discovery
    name: もっと早く知りたかった型
    description: 「なんでもっと早くこれを買わなかったんだ」系の後悔ベース。
    structure: |
      1行目: 「もっと早く知りたかった〇〇」
      2-3行目: 知らなかった頃の苦労
      4-5行目: 今これを使ってる満足感
      最後: 「過去の自分に教えたい」系の余韻
    constraints: |
      - 140文字以内
      - 後悔→解放のストーリー
      - 商品名は2回まで（自然な範囲で）

  - id: scenario_specific
    name: 具体シーン型
    description: 「こういう人にだけ刺さる」と限定して語る型。むしろリーチが伸びる逆説。
    structure: |
      1行目: 「〇〇な人にだけ言いたい」
      2-3行目: その人が困っているシチュエーション
      4-5行目: その状況をこの商品でこう変えた
      最後: 該当者への一言メッセージ
    constraints: |
      - 140文字以内
      - 「全員に刺さる」より「特定の人に刺さる」を意識
      - 共感トリガーを明確に
