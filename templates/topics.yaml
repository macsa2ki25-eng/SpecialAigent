# 避けるテーマ(炎上リスク or YMYL)
avoid:
  - 政治・宗教・思想
  - 特定の人物批判
  - 医学的な効果効能の断定（薬機法）
  - 投資・FXの具体的な金額断定（金商法）
  - 性別/国籍を揶揄するネタ
  - センシティブな時事ニュース
