# X (旧Twitter) スレッド投稿の「型」集 - 教育系コンテンツ向け
#
# story_topics.yaml の物語ネタを、複数ツイートに分けて投稿する。
# generator.py が --pattern <id> で指定して使う (未指定なら dialogue_revelation)。

patterns:

  - id: dialogue_revelation
    name: 対話劇 + 種明かし型
    description: 2人の対話で物語を進め、最後に種明かし(解説)で締める。教育系の王道。
    structure: |
      ツイート1 (フック): 強烈な提案 or 状況提示。読者の手を止める1行目。
      ツイート2: 学び手側の素直な反応 (ノリ気 or 疑問)。
      ツイート3: 物語の中核。具体的な数字や展開で「ん？」と思わせる。
      ツイート4: 違和感 or 結末。「儲かるはずなのに減ってる」のような瞬間。
      ツイート5 (種明かし): 何が起きていたかを初心者向けに解説。
      ツイート6 (任意): 教訓、応用例、読者への問いかけで余韻。
    constraints: |
      - 各ツイート 140文字以内 厳守
      - 1ツイート目で必ず読者を引き込む
      - 連投なので「続く...」「次へ」のような露骨な引きは入れない
      - 対話部分は AB AB の交互で短くテンポよく
      - 数字は具体的に (例: 1万円、500円、1.5倍)
      - ハッシュタグ・絵文字なし
      - 主婦でもわかる言葉。専門用語は登場人物の対話で必ず噛み砕く
      - 最後のツイートだけ作者目線の感想/問いかけで締めるのもアリ

  - id: number_shock
    name: 数字インパクト型
    description: 「あなたの直感を裏切る数字」を最初にぶつけて、その後ストーリーで納得させる。
    structure: |
      ツイート1: 衝撃的な数字を1行で提示 (例: 「1日1%増えると1年で38倍」)
      ツイート2: 「えっそんなに？」と思わせる対話 or 内省
      ツイート3: 数字の背景を簡単な計算式で
      ツイート4: 日常への置き換え (具体例)
      ツイート5: 教訓 or 実生活への応用
    constraints: |
      - 各ツイート 140文字以内 厳守
      - 1ツイート目はとにかく数字一発
      - 計算式は簡潔に (画像なしテキストで読める範囲)
      - ハッシュタグ・絵文字なし

  - id: misconception_correction
    name: 誤解→訂正型
    description: 「みんなこう思ってるよね？でも違うんです」型。共感→反転→納得の3段。
    structure: |
      ツイート1: 多くの人が信じている誤解を「あるある」として提示
      ツイート2: 「実はこれ、違います」と反転
      ツイート3: なぜ違うのか、根拠を示す
      ツイート4: 正しい理解の例
      ツイート5: 教訓 or 読者への呼びかけ
    constraints: |
      - 各ツイート 140文字以内 厳守
      - 攻撃的にならない (「アホ」「無知」NG)
      - 専門家ぶらない、対等な目線で
      - ハッシュタグ・絵文字なし
