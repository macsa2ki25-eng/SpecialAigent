# ブログ記事の「型」集 - はてなブログ向け、SEO最適化済み
#
# 1商品 = 1ブログ記事 が基本。文字数の目安: 1500〜3000字。
#
# generator.py が --pattern <id> で指定して使う。
# --pattern 未指定なら product_review (汎用型) を使う。

patterns:

  - id: product_review
    name: 汎用商品レビュー型
    description: 標準的な商品レビュー記事。SEOで検索流入を狙う基本形。
    seo_focus: |
      タイトル例: 「【正直レビュー】{商品名}を使ってみた感想と効果。{ベネフィット}」
      狙う検索キーワード: 「商品名」「商品名 レビュー」「商品名 効果」
    structure: |
      # タイトル (h1相当、はてなはタイトル別フィールド)

      ## はじめに（150字程度）
      - 読者の悩みに共感（「〜で困ってませんか？」）
      - この記事で何がわかるかを明示

      ## {商品名} を買った理由（300字程度）
      - 抱えていた問題の具体的な状況
      - 他に試したこと（簡潔に）
      - なぜこの商品を選んだか

      ## 実際に使ってみた結果（500字程度）
      - 使い方の手順（簡潔に）
      - 1日後 / 1週間後 / 1ヶ月後の変化
      - 数字で具体的に（重要）

      ## 良かった点（300字程度、3〜5項目を箇条書き）
      ## 気になった点（200字程度、1〜2項目）※必ず入れる、信頼性UP
      ## こんな人におすすめ（200字程度、3項目箇条書き）

      ## まとめ（150字程度）
      - 一行で結論
      - もう一度商品リンク

      [楽天アフィリリンク・Amazonアフィリリンクをセクション末に複数配置]
    affiliate_placement: |
      - "実際に使ってみた結果" セクションの最後
      - "まとめ" セクションの最後
      - 記事全体で2〜3箇所まで（多すぎるとSEO/UXに悪い）

  - id: comparison
    name: 比較記事型
    description: 「〇〇 vs △△ どっちがいい？」型。指名検索を取りやすい。
    seo_focus: |
      タイトル例: 「{商品A}と{商品B}を比較！結局どっちを買うべきか」
      狙う検索キーワード: 「商品A 商品B 違い」「商品A 商品B 比較」
    structure: |
      # 比較タイトル

      ## 結論を先に（100字、SEO的に重要）
      ## 比較表（h2、表組み）
      ## それぞれの特徴（h2 × 2）
      ## 用途別おすすめ（h2、3パターン）
      ## まとめ + 両方のアフィリリンク
    affiliate_placement: 各商品セクションの末尾、まとめの末尾

  - id: problem_solving
    name: 問題解決型
    description: 「〇〇に困ったらこれ」型。長期的に検索流入が安定。
    seo_focus: |
      タイトル例: 「{悩み}を解決した〇〇つの方法【実体験】」
      狙う検索キーワード: 「悩み 解決」「悩み 方法」
    structure: |
      # 悩みベースのタイトル

      ## こんな悩みありませんか？（共感セクション、200字）
      ## 試して効果のあった方法 (h2 × 3〜5)
        - 各方法の説明
        - その方法で使った商品（アフィリリンク）
      ## 一番効いたのはコレ（推し商品セクション）
      ## まとめ
    affiliate_placement: 各方法セクション内の商品紹介部分、推し商品セクション
