# X（旧Twitter）でインプレッションを稼ぐための「型」
# Claude API に渡すプロンプトで、毎回ランダムに1つを選択する。
#
# 型を追加したくなったら、ここに追記するだけでOK。
# generator.py は自動で読み込む。

patterns:

  - id: trivia_shock
    name: 衝撃雑学型
    genre: 雑学
    description: 「実は〜」で始まる驚き雑学。冒頭で即インパクト。
    structure: |
      1行目: 「実は〜だったの知ってた？」 or 「〜すぎて震えた」
      2-3行目: 具体例・数字・出典感のあるディテール
      最後: 余韻/自分の感想で締める（絵文字1つまで）
    example: |
      実は「ありがとう」を先に言うと脳が勝手に幸せ物質を出すらしい。

      つまり気分が落ち込んだときは、感謝される出来事を待つより、自分から誰かに「ありがとう」と言うほうが早い。

      脳、単純すぎて面白い。
    tone: 驚き+親しみやすさ

  - id: life_hack_list
    name: ライフハック3選型
    genre: ライフハック
    description: 「知らないと損する〇〇3選」のリスト形式。保存されやすい。
    structure: |
      1行目: 「知らないと損する〇〇3選」 or 「今すぐ使える〇〇テク」
      2-4行目: 箇条書きで3つ
      最後: 「試してみてね」系の一言
    example: |
      知らないと損する「朝5分」の使い方3選

      ・日光を浴びる(セロトニン爆上げ)
      ・水を飲む(脳は70%水分)
      ・深呼吸3回(自律神経リセット)

      これだけで午前の集中力が別人になります。
    tone: 実用+わかりやすさ

  - id: problem_solve
    name: 問題提起→解決型
    genre: ライフハック
    description: 「こんな悩みない？」→共感→解決策。ブックマーク率が高い。
    structure: |
      1行目: 「〜で悩んでる人、多くない？」
      2-3行目: 具体的なあるある
      4-5行目: 解決策 or 発想の転換
      最後: シンプルな締め
    example: |
      「やる気が出ないから動けない」で止まってる人、多くない？

      実は逆で、脳は「動き始めてから」やる気を出す仕組みらしい。

      つまり"やる気待ち"は永遠に来ない。5秒だけ動く。それだけで解決する。
    tone: 共感+背中を押す

  - id: counterintuitive
    name: 意外な真実型
    genre: 雑学+モチベ
    description: 「〇〇は実は逆」と常識を覆す型。リポストされやすい。
    structure: |
      1行目: 「〇〇は〜と思われがちだけど、実は逆」
      2-3行目: なぜ逆なのかの説明
      最後: 自分の見解 or 余韻
    example: |
      「努力する人は偉い」って言われがちだけど、実は逆。

      努力してる感覚があるうちは、まだ好きになりきれてない証拠。本当に向いてることは「努力」って感じない。

      頑張ってるのに成果出ないなら、種目を変えるサイン。
    tone: ハッとさせる

  - id: quote_resonance
    name: 心に響く言葉型
    genre: 名言
    description: 短く刺さる一言。リプで共感を呼びやすい。
    structure: |
      1-2行目: 本体となる一言(核)
      空行
      3-4行目: その一言の背景/解釈(自分の言葉で)
    example: |
      "やらなかった後悔は、やった後悔の10倍痛い"

      やって失敗したことは、時間が経つと笑い話になる。でも"やらなかった"は、10年後もずっと胸に残る。
    tone: 静かに刺さる

  - id: contrast
    name: 比較型（やる vs やらない）
    genre: ライフハック
    description: 「やっちゃダメな〇〇 vs やるべき〇〇」の対比構造。
    structure: |
      1行目: 「〇〇で差が出る人の違い」
      2-5行目: 箇条書きで対比(3つほど)
      最後: 一言でまとめ
    example: |
      伸びない人と伸びる人の違い

      ・完璧を目指す / とりあえず出す
      ・反省して止まる / 反省して動く
      ・他人を気にする / 自分に集中する

      差はスキルじゃなく、動きの速さ。
    tone: 説得力

  - id: self_story
    name: 体験談風ストーリー型
    genre: モチベ
    description: 自分語りで共感を誘う。「属人性」を出す重要な型。
    structure: |
      1行目: 「〇〇してた頃の話なんだけど」
      2-4行目: 短いストーリー(起承)
      最後: そこから得た気づき(転結)
    example: |
      会社員やめた直後、収入ゼロで3ヶ月間焦りまくってた。

      でも振り返ると、あの"焦った3ヶ月"があったから本気でスキル身につけた。

      安心して動ける環境では、本気は出せない。
    tone: リアル+等身大

  - id: before_after
    name: ビフォーアフター型
    genre: ライフハック
    description: 「〇〇を変えただけで」という変化フォーカス。
    structure: |
      1行目: 「〇〇を変えただけで、〜が激変した」
      2-3行目: 変える前の状態
      4-5行目: 変えた後の状態
      最後: 一言で
    example: |
      スマホのホーム画面を真っ白にしただけで、1日2時間浮いた。

      前: SNSアプリが真っ先に目に入る→気づいたら30分溶ける
      後: 検索で1個ずつ開く必要がある→そもそも開かなくなる

      意志力に頼るより、環境を変える方が100倍効く。
    tone: 実体験+即実行できる感

# 型を追加する際の指針
# - 1型 = 1目的(驚き/共感/学び/実用のいずれか単一)
# - 冒頭1行で全てが決まる。必ず「スクロールを止める力」があるか確認
# - 最終行で余韻を残す or 読者に行動を促す
# - 絵文字は1ツイートあたり0〜1個(多すぎるとbot感が出る)
