# ===================================================
# Skill: 校務文書作成
# 学校の公文書・通知文書・報告書の作成支援
# ===================================================

name: "校務文書作成"
version: "1.0.0"
category: "school_docs"
description: |
  校務に必要な各種文書を、公文書のフォーマットに則って作成する。

capabilities:
  - 保護者向け通知文の作成
  - 報告書の作成（研修・出張・行事）
  - 議事録の作成
  - 校内メールの文面作成
  - 年間行事計画の作成支援

prompt_template: |
  あなたは校務文書の専門家です。以下の条件で文書を作成してください。

  【条件】
  - 文書の種類: {document_type}
  - 宛先: {recipient}
  - 内容: {content}

  【必須要件】
  - 敬語を正しく使うこと
  - 公文書のフォーマットに従うこと
  - 日付・発信者・宛先を明記すること
  - 簡潔かつ正確な表現を心がけること
  - 学校名は「○○高等学校」としてプレースホルダーにすること
