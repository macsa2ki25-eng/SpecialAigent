# ===================================================
# Skill: 英語教材作成
# 高校英語教員向けの教材・テスト自動生成
# ===================================================

name: "英語教材作成"
version: "1.0.0"
category: "english_teacher"
description: |
  高校の英語教員向けに、テスト問題・ワークシート・指導案などを自動生成する。
  学習指導要領に準拠し、難易度別に対応。

capabilities:
  - テスト問題作成（選択・記述・リスニング原稿）
  - ワークシート作成（文法・読解・語彙）
  - 指導案作成（50分授業構成）
  - 解答・解説シート作成
  - 単語テスト・小テスト作成

parameters:
  difficulty_levels:
    - "基礎"      # 偏差値40-50レベル
    - "標準"      # 偏差値50-60レベル
    - "発展"      # 偏差値60以上レベル

  question_types:
    - "選択問題"
    - "穴埋め問題"
    - "並べ替え問題"
    - "英作文"
    - "長文読解"
    - "リスニング"
    - "語彙・単語"

  output_formats:
    - "markdown"   # デフォルト
    - "html"       # 印刷用
    - "csv"        # 成績管理用

prompt_template: |
  あなたはベテランの高校英語教師です。以下の条件で教材を作成してください。

  【条件】
  - 対象: 高校生（{grade}年生）
  - 範囲: {scope}
  - 難易度: {difficulty}
  - 問題数: {question_count}問
  - 形式: {question_types}

  【必須要件】
  - 学習指導要領に準拠すること
  - 解答と配点を必ず付けること
  - 出題意図を簡潔に記載すること
  - 100点満点で配点を設定すること

  【出力形式】
  Markdown形式で出力してください。
