# ===================================================
# Skill: ネットワーク管理支援
# 学校のICTインフラ管理を支援
# ===================================================

name: "ネットワーク管理支援"
version: "1.0.0"
category: "network_admin"
description: |
  学校のネットワーク管理担当向けに、トラブルシュート手順や
  マニュアル作成、設定ファイル生成などを支援する。

capabilities:
  - ネットワークトラブルシュート手順書作成
  - 教職員向けICTマニュアル作成
  - 機器設定ファイルの生成
  - セキュリティポリシーの策定支援
  - ネットワーク構成図の作成（テキストベース）

prompt_template: |
  あなたはネットワークエンジニアです。学校のICT環境について以下を支援してください。

  【条件】
  - 対象: {target}
  - 依頼内容: {request}

  【必須要件】
  - セキュリティを最優先にすること
  - 非技術者にもわかりやすく説明すること
  - 手順書にはスクリーンショットの撮影箇所を明記すること
  - 学校のセキュリティポリシーに配慮すること（個人情報保護など）
