<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習 - 東高３年 英単語やったんぞ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">英単語やったんぞ</div>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="study.html" class="active">学習</a>
      <a href="stats.html">統計</a>
    </nav>
  </header>

  <main class="container">
    <!-- セッション情報 -->
    <div class="session-stats" id="session-stats">
      <div class="text-center"><div class="stat-value" id="stat-correct">0</div><div class="text-sm text-muted">正解</div></div>
      <div class="text-center"><div class="stat-value" id="stat-wrong">0</div><div class="text-sm text-muted">不正解</div></div>
      <div class="text-center"><div class="stat-value" id="stat-accuracy">-</div><div class="text-sm text-muted">正答率</div></div>
      <div class="text-center"><div class="stat-value" id="stat-remaining">0</div><div class="text-sm text-muted">残り</div></div>
    </div>

    <div class="progress-bar-container mb-8">
      <div class="progress-bar green" id="progress-bar" style="width:0%"></div>
    </div>

    <!-- クイズカード -->
    <div class="card" id="quiz-card">
      <div class="quiz-question">
        <div class="quiz-word-number" id="word-number">No.1</div>
        <div id="question-text" class="quiz-word"></div>
      </div>

      <div class="answer-grid" id="answer-grid"></div>

      <div id="feedback-area" class="hidden">
        <div class="feedback" id="feedback-msg"></div>
        <div class="text-center text-sm text-muted mt-8" id="card-info"></div>
        <div class="grade-buttons" id="grade-buttons">
          <button class="grade-btn again" data-grade="1"><span class="grade-label">もう一回</span><span class="grade-interval" id="interval-1"></span></button>
          <button class="grade-btn hard" data-grade="2"><span class="grade-label">難しい</span><span class="grade-interval" id="interval-2"></span></button>
          <button class="grade-btn good" data-grade="3"><span class="grade-label">正解</span><span class="grade-interval" id="interval-3"></span></button>
          <button class="grade-btn easy" data-grade="4"><span class="grade-label">簡単</span><span class="grade-interval" id="interval-4"></span></button>
        </div>
      </div>
    </div>

    <!-- セッション完了 -->
    <div class="card hidden" id="session-complete">
      <div class="session-complete">
        <h2>学習完了！</h2>
        <div class="big-score" id="final-accuracy">0%</div>
        <p class="text-muted mt-8">正答率</p>
        <div class="summary-grid mt-16">
          <div class="summary-item"><div class="num" id="final-correct">0</div><div class="label">正解</div></div>
          <div class="summary-item"><div class="num" id="final-wrong">0</div><div class="label">不正解</div></div>
          <div class="summary-item"><div class="num" id="final-total">0</div><div class="label">合計</div></div>
        </div>
        <div class="mt-16">
          <a href="index.html" class="btn btn-primary">ホームへ戻る</a>
          <button class="btn btn-accent" id="study-again-btn" style="margin-left:8px">もう一度</button>
        </div>
      </div>
    </div>

    <!-- 範囲未選択 -->
    <div class="card hidden" id="no-range-msg">
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <p>学習範囲が選択されていません。</p>
        <a href="index.html" class="btn btn-primary mt-16">ホームで範囲を設定</a>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/words.js"></script>
  <script src="js/fsrs.js"></script>
  <script>
  (function() {
    'use strict';
    const CARD_DATA_KEY = 'cardData';
    const RANGES_KEY = 'savedRanges';
    const REVIEW_HISTORY_KEY = 'reviewHistory';

    // URL params
    const params = new URLSearchParams(window.location.search);
    const rangeId = params.get('rangeId');
    const mode = params.get('mode') || 'jp2en';
    const choiceCount = parseInt(params.get('choices')) || 4;
    const targetRetention = parseFloat(params.get('retention')) || 0.85;

    // Load range
    const ranges = JSON.parse(localStorage.getItem(RANGES_KEY) || '[]');
    const range = ranges.find(r => r.id === rangeId);

    if (!range) {
      document.getElementById('quiz-card').classList.add('hidden');
      document.getElementById('session-stats').classList.add('hidden');
      document.getElementById('no-range-msg').classList.remove('hidden');
      return;
    }

    // Get words in range
    const rangeWords = window.WORDS.filter(w => w.no >= range.start && w.no <= range.end);
    if (rangeWords.length === 0) return;

    // Load card data
    function loadCardData() {
      return JSON.parse(localStorage.getItem(CARD_DATA_KEY) || '{}');
    }
    function saveCardData(data) {
      localStorage.setItem(CARD_DATA_KEY, JSON.stringify(data));
    }

    // Build study queue
    const fsrs = window.FSRS;
    const now = new Date();
    let cardData = loadCardData();

    function buildQueue() {
      const dueCards = [];
      const newCards = [];

      rangeWords.forEach(w => {
        const card = cardData[w.no];
        if (!card || card.state === 'new') {
          newCards.push(w.no);
        } else {
          const r = fsrs.getRecallProbability(card, now);
          if (r <= targetRetention || card.state === 'learning') {
            dueCards.push({ no: w.no, r: r, state: card.state });
          }
        }
      });

      // Sort due: learning first, then by R ascending (most forgotten first)
      dueCards.sort((a, b) => {
        if (a.state === 'learning' && b.state !== 'learning') return -1;
        if (b.state === 'learning' && a.state !== 'learning') return 1;
        return a.r - b.r;
      });

      const queue = dueCards.map(d => d.no);
      // Add up to 20 new cards
      const newLimit = Math.min(20, newCards.length);
      for (let i = 0; i < newLimit; i++) {
        queue.push(newCards[i]);
      }
      return queue;
    }

    let queue = buildQueue();
    let currentIdx = 0;
    let sessionCorrect = 0;
    let sessionWrong = 0;
    let currentWord = null;
    let correctAnswer = null;
    let answered = false;

    // DOM elements
    const quizCard = document.getElementById('quiz-card');
    const questionText = document.getElementById('question-text');
    const wordNumber = document.getElementById('word-number');
    const answerGrid = document.getElementById('answer-grid');
    const feedbackArea = document.getElementById('feedback-area');
    const feedbackMsg = document.getElementById('feedback-msg');
    const cardInfo = document.getElementById('card-info');
    const gradeButtons = document.getElementById('grade-buttons');
    const progressBar = document.getElementById('progress-bar');
    const sessionComplete = document.getElementById('session-complete');

    function updateStats() {
      document.getElementById('stat-correct').textContent = sessionCorrect;
      document.getElementById('stat-wrong').textContent = sessionWrong;
      const total = sessionCorrect + sessionWrong;
      document.getElementById('stat-accuracy').textContent = total > 0 ? Math.round(sessionCorrect / total * 100) + '%' : '-';
      document.getElementById('stat-remaining').textContent = Math.max(0, queue.length - currentIdx);
      const pct = queue.length > 0 ? (currentIdx / queue.length * 100) : 0;
      progressBar.style.width = pct + '%';
    }

    function getWord(no) {
      return window.WORDS.find(w => w.no === no);
    }

    function generateChoices(correctWord) {
      const choices = [correctWord];
      const pool = rangeWords.filter(w => w.no !== correctWord.no);

      // If pool too small, use all words
      const usePool = pool.length >= choiceCount - 1 ? pool : window.WORDS.filter(w => w.no !== correctWord.no);

      while (choices.length < choiceCount && usePool.length > 0) {
        const idx = Math.floor(Math.random() * usePool.length);
        const picked = usePool.splice(idx, 1)[0];
        if (!choices.find(c => c.no === picked.no)) {
          choices.push(picked);
        }
      }

      // Shuffle
      for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
      }
      return choices;
    }

    function showQuestion() {
      if (currentIdx >= queue.length) {
        showComplete();
        return;
      }

      answered = false;
      feedbackArea.classList.add('hidden');
      const wordNo = queue[currentIdx];
      currentWord = getWord(wordNo);
      correctAnswer = currentWord;

      wordNumber.textContent = 'No.' + currentWord.no;

      if (mode === 'jp2en') {
        questionText.className = 'quiz-meaning';
        questionText.textContent = currentWord.ja;
      } else {
        questionText.className = 'quiz-word';
        questionText.textContent = currentWord.en;
      }

      const choices = generateChoices(currentWord);
      answerGrid.innerHTML = '';
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = mode === 'jp2en' ? c.en : c.ja;
        btn.dataset.no = c.no;
        btn.addEventListener('click', () => handleAnswer(btn, c));
        answerGrid.appendChild(btn);
      });

      updateStats();
    }

    function handleAnswer(btn, chosen) {
      if (answered) return;
      answered = true;

      const isCorrect = chosen.no === correctAnswer.no;

      // Disable all buttons
      answerGrid.querySelectorAll('.answer-btn').forEach(b => {
        b.classList.add('disabled');
        if (parseInt(b.dataset.no) === correctAnswer.no) {
          b.classList.add('correct');
        }
      });

      if (isCorrect) {
        btn.classList.add('correct');
        feedbackMsg.className = 'feedback correct-fb';
        feedbackMsg.textContent = '正解！';
        sessionCorrect++;
      } else {
        btn.classList.add('wrong');
        feedbackMsg.className = 'feedback wrong-fb';
        feedbackMsg.textContent = '不正解… 正解: ' + (mode === 'jp2en' ? correctAnswer.en : correctAnswer.ja);
        sessionWrong++;
      }

      // Show card info
      const card = cardData[currentWord.no];
      if (card && card.state !== 'new') {
        const r = fsrs.getRecallProbability(card, now);
        cardInfo.textContent = '安定性: ' + card.S.toFixed(1) + '日 | 難易度: ' + card.D.toFixed(1) + ' | 記憶率: ' + (r * 100).toFixed(0) + '%';
      } else {
        cardInfo.textContent = '新規カード';
      }

      // Show grade intervals
      const tempCard = card || fsrs.getInitialCard();
      for (let g = 1; g <= 4; g++) {
        const simulated = fsrs.reviewCard({...tempCard}, g, now);
        const days = simulated.scheduledDays;
        const label = days < 1 ? Math.round(days * 24 * 60) + '分' : days < 1.5 ? '1日' : Math.round(days) + '日';
        document.getElementById('interval-' + g).textContent = label;
      }

      // If wrong, recommend "Again"
      if (!isCorrect) {
        gradeButtons.querySelector('[data-grade="1"]').classList.add('recommended');
      } else {
        gradeButtons.querySelector('[data-grade="3"]').classList.add('recommended');
      }

      feedbackArea.classList.remove('hidden');
      updateStats();
    }

    // Grade button handlers
    gradeButtons.querySelectorAll('.grade-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const grade = parseInt(btn.dataset.grade);
        const card = cardData[currentWord.no] || fsrs.getInitialCard();
        const updated = fsrs.reviewCard(card, grade, now);
        cardData[currentWord.no] = updated;
        saveCardData(cardData);

        // Record review history
        const today = now.toISOString().slice(0, 10);
        const history = JSON.parse(localStorage.getItem(REVIEW_HISTORY_KEY) || '{}');
        history[today] = (history[today] || 0) + 1;
        localStorage.setItem(REVIEW_HISTORY_KEY, JSON.stringify(history));

        // If grade=1 (Again), re-add to end of queue
        if (grade === 1) {
          queue.push(currentWord.no);
        }

        // Remove recommended class
        gradeButtons.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('recommended'));

        currentIdx++;
        showQuestion();
      });
    });

    function showComplete() {
      quizCard.classList.add('hidden');
      sessionComplete.classList.remove('hidden');
      const total = sessionCorrect + sessionWrong;
      document.getElementById('final-correct').textContent = sessionCorrect;
      document.getElementById('final-wrong').textContent = sessionWrong;
      document.getElementById('final-total').textContent = total;
      document.getElementById('final-accuracy').textContent = total > 0 ? Math.round(sessionCorrect / total * 100) + '%' : '-';
      updateStats();
    }

    document.getElementById('study-again-btn').addEventListener('click', () => {
      window.location.reload();
    });

    // Toast helper
    function showToast(msg, type) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast ' + (type || '');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Init
    if (queue.length === 0) {
      quizCard.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><p>復習が必要な単語はありません！</p><p class="text-muted text-sm mt-8">素晴らしい！すべての単語が十分に定着しています。</p><a href="index.html" class="btn btn-primary mt-16">ホームへ戻る</a></div>';
    } else {
      showToast(range.name + ' (' + queue.length + '問)', 'success');
      showQuestion();
    }
  })();
  </script>
</body>
</html>
