# X上で実際にバズっていた「商品紹介系」投稿のサンプル集。
# Claude API の few-shot プロンプトとして使われる。
#
# 集め方:
#   X で「商品名」「買ってよかった」「神アイテム」などで検索
#   いいね数 1000+ の投稿を中心に、構造を真似したいものを20〜50個集める
#   著作権配慮のため、完全引用ではなく「型」を抽出する
#
# 必須項目: id, category, hook (1行目), structure (構造の説明), why_works (なぜバズったか)
# 任意項目: anonymized_text (匿名化した本文)、likes (参考: いいね数)

examples:
  - id: garden_tool_001
    category: 園芸・ガーデニング
    hook: 庭の雑草地獄が3日で終わった話
    structure: |
      1行目: 衝撃の結果を先出し（「3日で終わった」「神アイテム」）
      2-4行目: Before（どれだけ苦しんでいたか）
      5-6行目: After（劇的な変化を具体的な数字で）
      最後: 一言の感想で締める（過剰な勧誘なし）
    why_works: |
      Before/Afterのギャップが強い。具体的な日数・回数の数字が信頼感を生む。
      売り込みではなく「自分の体験」のトーン。
    anonymized_text: |
      庭の雑草地獄が3日で終わった話。

      草刈り機を毎週末出動、2週間で元通り、腰は限界。
      もう諦めかけてた。

      ホムセンで聞いた粒タイプの除草剤に切り替えた結果、
      1週間で枯れて、2ヶ月草が生えなくなった。

      なんで早くこれにしなかったんだ…。
    likes: 12000

  - id: kitchen_001
    category: キッチン用品
    hook: これ買ってから朝の洗い物が激減した
    structure: |
      1行目: ビフォーアフター系の引き
      2-3行目: 困っていた具体的な状況
      4-5行目: 商品名(やんわり) + 何が変わったか
      最後: リピ確 or 「もっと早く知りたかった」系
    why_works: |
      日常の小さな悩み解消は共感を呼ぶ。「朝の洗い物」のように時間帯を入れると情景が浮かぶ。
    likes: 8500

  - id: parenting_001
    category: 子育て用品
    hook: ワンオペ育児を救ったアイテム3つ晒します
    structure: |
      1行目: 「3つ晒します」「正直に言う」系の引き
      2-4行目: 各アイテム1行ずつで列挙(具体名)
      最後: 「全部買い直しても損なし」など強い肯定
    why_works: |
      リスト型は保存されやすい。「ワンオペ」「正直に言う」が共感の引き金。
    likes: 25000
