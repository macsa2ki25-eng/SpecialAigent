topics:
- id: pokemon-card
  title: ポケモンカード（ポケカ）
  description: '子供と一緒にやってる、TCG（トレーディングカードゲーム）。

    バトルしながら、自然に算数も社会性も身につく。

    ルールはおおざっぱでOK、楽しさ優先で。

    '
  age_range: 5歳〜小学校高学年
  angles:
  - id: addition
    learning: 足し算（HPやダメージの累計計算）
    scene: '相手を攻撃するとき「ダメージ20と弱点で40プラス、合計60出る」と頭で計算する。

      紙のドリルでやらせるよりも何倍も覚えが速い。

      毎ターン繰り返すから、いつの間にか暗算が速くなっている。

      '
  - id: subtraction
    learning: 引き算（残りHP把握）
    scene: '自分のHPが120で、ダメージ50を受けたら残り70。

      あと2発はもつな、と判断する。

      「残り◯」を毎ターン考えるので、引き算が反射神経になる。

      '
  - id: multiplication
    learning: 掛け算の感覚（弱点で2倍、抵抗力で-20）
    scene: '炎ポケモンに草で攻撃すると2倍ダメージ。

      「30の2倍は60」を実戦で体感する。

      学校で掛け算を習う前に、体感としての「倍」を覚えてしまう。

      '
  - id: strategy-thinking
    learning: 数手先を読む戦略思考
    scene: 'このターン攻撃せず、次のターンに大技を打つほうが効率的、みたいな先読み。

      幼児期から「結果から逆算する」習慣がつく。

      将棋や囲碁につながる思考の基礎。

      '
  - id: rule-following
    learning: ルールを守る・順番を待つ
    scene: 'ターン制で必ず順番が回ってくる。相手のターン中は手を出さない。

      飛び級して攻撃しない。

      家族ゲームで毎日やると、学校での集団行動の素地になる。

      '
  - id: lose-emotion
    learning: 負けを受け入れる練習
    scene: '負けても泣かない、机を叩かない。

      「次は勝つ」と気持ちを切り替える。

      実生活の挫折耐性につながる。

      親が手加減しすぎないのもポイント。

      '
  - id: win-grace
    learning: 勝ったときに調子に乗らない
    scene: '勝っても煽らない、相手の良かったプレイを褒める。

      スポーツマンシップは家庭の小さな勝負で身につく。

      負けた相手の気持ちを想像する練習にもなる。

      '
  - id: probability-sense
    learning: 確率感覚の芽生え
    scene: '山札に何が入ってるかを把握して、欲しいカードを引ける確率をなんとなく感じる。

      中学数学の確率に入る前に、肌感覚で慣れる。

      「リスクとリターン」の概念も同時に育つ。

      '
  posted_angles_count: 1
