# お金・経済・投資の教育系ストーリーのネタ帳。
# generator.py が --topic <id> で読み込んでスレッド投稿を生成する。
#
# 主婦でもわかりやすい例え話・物語形式を意識している。
# 専門用語が出てくる場合は必ず登場人物の対話で噛み砕く。
#
# 必須項目: id, title, category, key_concept, setup, characters, story_arc, lesson
# 任意項目: difficulty (easy/normal/hard), tags

topics:

  - id: non-ergodicity-coin
    title: 期待値1.05の罠 (コイン投げ)
    category: 確率と数字のトリック
    difficulty: normal
    key_concept: |
      期待値(算術平均)と長期の実際の成長率(幾何平均)は別物。
      乗法的な世界では期待値プラスでも資産は減ることがある。
    setup: |
      コイン投げのゲーム。表50%で資産1.5倍、裏50%で資産0.6倍。
      表だけ見ると算術平均は (1.5+0.6)/2 = 1.05 で見かけはプラス。
      でも実際の長期成長率は √(1.5×0.6) = 0.949 で、回を重ねるほど資産が減る。
    characters:
      teacher: 知ったかぶりの夫
      learner: 主婦の妻
    story_arc: |
      1. 夫が妻に「期待値1.05だからやればやるほど儲かる」と提案
      2. 妻、ノリノリで「やる！」
      3. 1万円スタート → 1万5千円 (表) → 9千円 (裏) → 1万3500円 (表) → 8100円 (裏) → ...
         5回目あたりで明らかに減ってる
      4. 妻「儲かるって言ったよね？」
      5. 解説: 期待値1.05は「平均」、でも資産は掛け算で動く。
         √(1.5×0.6)=0.949 が実際の成長率。
      6. 教訓: パーセント変動の世界では、算術平均ではなく幾何平均で考える。
    lesson: |
      期待値プラスでも長期で負けるゲームがある。投資・副業・人生の意思決定でも同じ。
    tags: [確率, 期待値, 投資の罠, 直感に反する]

  - id: compound-interest-magic
    title: 1日1%の魔法 (複利の力)
    category: 複利の威力
    difficulty: easy
    key_concept: |
      1日1%増えるだけで、365日後には約37.78倍。複利は線形ではなく指数的。
    setup: |
      毎日1%ずつ資産が増えるとどうなるか。1.01^365 ≈ 37.78
      逆に毎日1%ずつ減ると1年後は0.026倍 (97.4%消滅)
    characters:
      teacher: 真面目な銀行員
      learner: 「1日1%なら大したことない」と思ってる主婦
    story_arc: |
      1. 銀行員が「毎日1%のリターン、1年後どうなる？」と問う
      2. 主婦「1日1%なら365%、4.65倍くらい？」
      3. 銀行員「いえ、約37.78倍です」と数字を見せる
      4. 主婦「!?」
      5. 解説: 複利の計算式 1.01^365 ≈ 37.78
      6. 教訓: 小さな差も毎日積み上げると凄いことになる
    lesson: |
      複利は人類最大の発明 (アインシュタイン談)。
      投資だけでなく勉強・運動・習慣も同じ仕組み。
    tags: [複利, 指数関数, 習慣]

  - id: rule-of-72
    title: 「72の法則」で資産が2倍になる年数を暗算
    category: 投資の小ワザ
    difficulty: easy
    key_concept: |
      72 ÷ 年利(%) ≈ 元本が2倍になる年数。瞬時に試算できる。
    setup: |
      年利5%なら72÷5=14.4年で2倍。
      年利3%なら72÷3=24年で2倍。
      銀行普通預金0.001%なら72÷0.001=72,000年で2倍 (実質ゼロ)。
    characters:
      teacher: 投資詳しい友達
      learner: 預金しか知らない主婦
    story_arc: |
      1. 主婦「銀行に100万円預けてる。利子0.001%」
      2. 友達「それ、2倍になるのに7万2000年かかるよ」
      3. 主婦「!?」
      4. 友達「72÷利率で計算できる。年利5%なら14年で2倍」
      5. 主婦「投資信託の年利5%って凄いんだ…」
      6. 教訓: 銀行預金で「資産形成」は数学的に困難
    lesson: |
      72の法則を覚えるだけで、利回りの本当の意味が見える。
      預金と投資の差は時間で爆発的に広がる。
    tags: [複利, 投資入門, 預金]

  - id: inflation-eats-savings
    title: 貯金1000万円が30年後に何の価値になるか
    category: インフレの恐怖
    difficulty: normal
    key_concept: |
      年2%のインフレが30年続くと、現金の価値は約0.55倍に目減り。
    setup: |
      1000万円を金庫に入れて30年放置。
      現金額面は1000万円のまま。でも年2%インフレなら実質購買力は約552万円相当。
      預金金利0.001%でもほぼ同じ結果。
    characters:
      teacher: ファイナンシャルプランナー
      learner: 「タンス預金が一番安全」と信じてる主婦
    story_arc: |
      1. 主婦「タンス預金1000万円ある、安心」
      2. FP「30年後、その1000万円で買えるものは半分になります」
      3. 主婦「お金は減ってないのに？」
      4. FP「物の値段が上がるから。今100円のジュース、30年後は181円」
      5. 解説: インフレ2%×30年 → 物価は1.811倍 → 同じ金額で買える物は0.552倍
      6. 教訓: 何もしないこと自体がリスク
    lesson: |
      「貯金しておけば安全」は幻想。インフレに対抗するには増やす必要がある。
    tags: [インフレ, 貯金, 資産防衛]

  - id: sunk-cost
    title: 1500円のラーメンを残せない心理 (サンクコスト)
    category: 行動経済学
    difficulty: easy
    key_concept: |
      払ってしまった1500円(サンクコスト)は、これからの判断に影響すべきでないが、
      人間はどうしても「もったいない」で行動を歪める。
    setup: |
      1500円のラーメン。半分食べたら満腹、味も微妙。
      でも残りを無理して食べる→気持ち悪くなる→夕食抜き→明日の体調も悪い。
      払った1500円は何しても戻らない。これからの「健康」だけが判断材料のはず。
    characters:
      teacher: 行動経済学詳しい友達
      learner: 「もったいない」が口癖の主婦
    story_arc: |
      1. 主婦「1500円のラーメン、無理して全部食べた」
      2. 友達「それ、気持ち悪くなったでしょ？」
      3. 主婦「うん、夕食食べられなかった」
      4. 友達「払った1500円は戻らない。残すかどうかは『これからの体調』だけで決めるべきだった」
      5. 解説: 行動経済学でいうサンクコスト効果。投資の損切りができないのも同じ
      6. 教訓: 「もったいない」は時に毒になる
    lesson: |
      過去の支出は、これからの判断材料にしない。投資・副業・人間関係でも同じ。
    tags: [行動経済学, 損切り, 心理]

  - id: gamblers-fallacy
    title: 赤が10回続いたら次は黒？ (ギャンブラーの誤謬)
    category: 確率の錯覚
    difficulty: easy
    key_concept: |
      独立試行において、過去の結果は次の確率に影響しない。
      赤が10回続いても、次の赤の確率は依然として1/2。
    setup: |
      ルーレットで赤が10回連続。
      「そろそろ黒が来るはず」と思って黒に大金張る → でも次の確率は変わらず1/2。
      「ホットハンド」「平均回帰」と混同される。
    characters:
      teacher: 確率を学んだ主婦の友達
      learner: 「そろそろ来るはず」と信じる主婦
    story_arc: |
      1. 主婦「宝くじ、10回連続外れたから次は当たるはず」
      2. 友達「それ、当たり方は1回目と同じ確率だよ」
      3. 主婦「えー、10回連続外れたんだから、確率が…」
      4. 友達「それぞれの抽選は独立。過去の結果は次に影響しない」
      5. 解説: ギャンブラーの誤謬。コイン投げで10回連続表でも、11回目の表確率は1/2のまま
      6. 教訓: 「次こそ来る」は錯覚。これでハマる人が多い
    lesson: |
      独立した出来事の連続は、人間の直感を裏切る。
      ギャンブル・宝くじでハマる人の多くがこの誤謬に陥っている。
    tags: [確率, ギャンブル, 心理錯覚]

  - id: dollar-cost-averaging
    title: 毎月3万円積立 vs 一括360万円 どっちが得？
    category: 投資手法
    difficulty: normal
    key_concept: |
      ドルコスト平均法は「タイミングを当てに行かない」のが強み。
      ただし長期上昇相場では一括投資の方が期待リターンは高い。
    setup: |
      10年間で360万円を投資する場合、
      A: 毎月3万円積立(ドルコスト平均法)
      B: 最初に360万円一括
      過去データではBのほうが期待リターン高いが、Aは精神的に楽。
    characters:
      teacher: 投資歴10年の友達
      learner: 投資初挑戦の主婦
    story_arc: |
      1. 主婦「360万円できた、投資しようか迷ってる」
      2. 友達「一括と毎月積立、どっちがいいか考えてる？」
      3. 主婦「タイミング外したら怖いから毎月かな」
      4. 友達「過去データは一括が有利。でも精神的負担が違う」
      5. 解説: 「相場が上がる前提なら早く投資した方が有利」だが、精神安定が継続の鍵
      6. 教訓: 数学的最適解 ≠ 自分にとっての最適解
    lesson: |
      初心者はまず「続けられる方」を選ぶ。続けられなければゼロ。
    tags: [投資, ドルコスト, 心理]
