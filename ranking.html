<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランキング - 東高３年 英単語やったんぞ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">英単語やったんぞ</div>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="ranking.html" class="active">ランキング</a>
      <a href="avatar.html">アバター</a>
      <a href="tamakocchi.html">たまこっち</a>
      <a href="stats.html">統計</a>
      <a href="avatar.html" class="chip-display" id="chip-balance">
        <span class="chip-icon">M</span><span id="chip-amount">0</span>
      </a>
    </nav>
  </header>

  <main class="container">
    <!-- 未設定時の案内 -->
    <div class="card" id="setup-card" style="display:none">
      <div class="card-title">ランキング参加登録</div>
      <div class="help-bubble">
        ランキングに参加するために、以下の情報を入力してください。<br>
        <strong>氏名・クラス情報は先生だけが確認できます。ランキングにはニックネームのみ表示されます。</strong>
      </div>

      <div class="form-row mt-8">
        <div class="form-group">
          <label for="setup-grade">学年：</label>
          <input type="number" id="setup-grade" class="form-control" placeholder="3" min="1" max="6" style="width:80px">
        </div>
        <div class="form-group">
          <label for="setup-class">クラス：</label>
          <input type="number" id="setup-class" class="form-control" placeholder="2" min="1" max="10" style="width:80px">
        </div>
        <div class="form-group">
          <label for="setup-number">出席番号：</label>
          <input type="number" id="setup-number" class="form-control" placeholder="15" min="1" max="50" style="width:80px">
        </div>
      </div>
      <div class="form-group mt-8">
        <label for="setup-realname">氏名（本名）：</label>
        <input type="text" id="setup-realname" class="form-control" placeholder="例：東高 太郎" maxlength="20">
      </div>
      <div class="form-group mt-8">
        <label for="setup-nickname">ニックネーム（ランキングに表示される名前）：</label>
        <input type="text" id="setup-nickname" class="form-control" placeholder="例：まこたん" maxlength="12">
      </div>
      <button class="btn btn-accent btn-block mt-8" id="setup-save-btn">設定して参加する！</button>
    </div>

    <!-- 設定済み：ランキング表示 -->
    <div id="ranking-main" style="display:none">
      <!-- 自分の順位 -->
      <div class="ranking-summary" id="my-rank-summary">
        <div class="summary-item">
          <div class="num" id="my-rank">-</div>
          <div class="label">自分の順位</div>
        </div>
        <div class="summary-item">
          <div class="num" id="my-questions">0</div>
          <div class="label">解いた問題数</div>
        </div>
        <div class="summary-item">
          <div class="num" id="my-login-days">0</div>
          <div class="label">ログイン日数</div>
        </div>
      </div>

      <!-- ソート切り替え -->
      <div class="ranking-sort-pills" id="sort-pills">
        <button class="active" data-sort="totalQuestions">解いた問題数</button>
        <button data-sort="loginDays">ログイン日数</button>
        <button data-sort="streak">連続ログイン</button>
        <button data-sort="chips">マコチップ</button>
      </div>

      <!-- ランキングテーブル -->
      <div class="card" style="padding:0;overflow:hidden">
        <table class="ranking-table">
          <thead>
            <tr id="ranking-header">
              <th style="width:36px">#</th>
              <th class="rank-name">名前</th>
              <th class="sortable sorted" data-sort="totalQuestions">問題数</th>
              <th class="sortable" data-sort="loginDays">ログイン</th>
              <th class="sortable" data-sort="streak">連続</th>
              <th class="sortable" data-sort="chips">Ⓜ獲得</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <tr><td colspan="6" class="text-muted" style="padding:24px">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 設定変更 -->
      <details class="mt-16" style="font-size:0.85rem">
        <summary style="cursor:pointer;color:var(--gray-600)">登録情報を変更する</summary>
        <div class="api-setup mt-8">
          <div class="form-row">
            <div class="form-group">
              <label>学年：</label>
              <input type="number" id="edit-grade" min="1" max="6" style="width:80px">
            </div>
            <div class="form-group">
              <label>クラス：</label>
              <input type="number" id="edit-class" min="1" max="10" style="width:80px">
            </div>
            <div class="form-group">
              <label>出席番号：</label>
              <input type="number" id="edit-number" min="1" max="50" style="width:80px">
            </div>
          </div>
          <div class="form-group">
            <label>氏名：</label>
            <input type="text" id="edit-realname" maxlength="20">
          </div>
          <div class="form-group">
            <label>ニックネーム：</label>
            <input type="text" id="edit-nickname" maxlength="12">
          </div>
          <button class="btn btn-sm btn-primary mt-8" id="edit-save-btn">保存</button>
          <span class="api-status" id="api-status"></span>
        </div>
      </details>

      <button class="btn btn-outline btn-block mt-8" id="refresh-btn">ランキングを更新</button>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/makochip.js"></script>
  <script src="js/sync.js"></script>
  <script>
  (function() {
    'use strict';
    var RS = window.RankingSync;
    var currentSort = 'totalQuestions';
    var lastStudents = [];

    function updateChipDisplay() {
      var el = document.getElementById('chip-amount');
      if (el && window.MakoChip) el.textContent = MakoChip.getBalance();
    }

    function showToast(msg, type) {
      var container = document.getElementById('toast-container');
      var toast = document.createElement('div');
      toast.className = 'toast ' + (type || '');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }

    // --- 初期表示判定 ---
    function checkSetup() {
      if (RS.isConfigured()) {
        document.getElementById('setup-card').style.display = 'none';
        document.getElementById('ranking-main').style.display = 'block';
        // 編集フォームに現在の値をセット
        document.getElementById('edit-grade').value    = RS.getGrade();
        document.getElementById('edit-class').value    = RS.getClass();
        document.getElementById('edit-number').value   = RS.getNumber();
        document.getElementById('edit-realname').value = RS.getRealName();
        document.getElementById('edit-nickname').value = RS.getNickname();
        loadRanking();
        RS.syncToServer();
      } else {
        document.getElementById('setup-card').style.display = 'block';
        document.getElementById('ranking-main').style.display = 'none';
      }
    }

    function validateAndSave(grade, cls, number, realName, nickname) {
      if (!grade)    { alert('学年を入力してね！'); return false; }
      if (!cls)      { alert('クラスを入力してね！'); return false; }
      if (!number)   { alert('出席番号を入力してね！'); return false; }
      if (!realName) { alert('氏名を入力してね！'); return false; }
      if (!nickname) { alert('ニックネームを入力してね！'); return false; }
      RS.setProfile(nickname, grade, cls, number, realName);
      return true;
    }

    // --- 初期設定保存 ---
    document.getElementById('setup-save-btn').addEventListener('click', function() {
      var grade    = document.getElementById('setup-grade').value.trim();
      var cls      = document.getElementById('setup-class').value.trim();
      var number   = document.getElementById('setup-number').value.trim();
      var realName = document.getElementById('setup-realname').value.trim();
      var nickname = document.getElementById('setup-nickname').value.trim();
      if (!validateAndSave(grade, cls, number, realName, nickname)) return;
      showToast('登録完了！ランキングに参加しました', 'success');
      checkSetup();
    });

    // --- 設定変更保存 ---
    document.getElementById('edit-save-btn').addEventListener('click', function() {
      var grade    = document.getElementById('edit-grade').value.trim();
      var cls      = document.getElementById('edit-class').value.trim();
      var number   = document.getElementById('edit-number').value.trim();
      var realName = document.getElementById('edit-realname').value.trim();
      var nickname = document.getElementById('edit-nickname').value.trim();
      if (!validateAndSave(grade, cls, number, realName, nickname)) return;
      showToast('設定を保存しました', 'success');
      RS.syncToServer(function() { loadRanking(); });
    });

    // --- ランキング読み込み ---
    function loadRanking() {
      var status = document.getElementById('api-status');
      RS.fetchRanking(function(students, err) {
        if (err) {
          if (status) { status.className = 'api-status disconnected'; status.textContent = '接続エラー'; }
          document.getElementById('ranking-body').innerHTML =
            '<tr><td colspan="6" class="text-muted" style="padding:24px">データを取得できませんでした。<br>API URLを確認してね。</td></tr>';
          return;
        }
        if (status) { status.className = 'api-status connected'; status.textContent = '接続OK'; }
        lastStudents = students;
        renderRanking(lastStudents);
      });
    }

    // --- ソート列ヘッダー更新 ---
    function updateSortHeader() {
      document.querySelectorAll('#ranking-header th.sortable').forEach(function(th) {
        th.classList.toggle('sorted', th.dataset.sort === currentSort);
      });
      document.querySelectorAll('#sort-pills button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === currentSort);
      });
    }

    // --- ランキング描画 ---
    function renderRanking(students) {
      students.sort(function(a, b) { return (b[currentSort] || 0) - (a[currentSort] || 0); });
      updateSortHeader();

      var myNickname = RS.getNickname();
      var myRank = -1;
      var myData = null;

      for (var i = 0; i < students.length; i++) {
        if (students[i].nickname === myNickname) {
          myRank = i + 1;
          myData = students[i];
          break;
        }
      }

      document.getElementById('my-rank').textContent = myRank > 0 ? myRank + '位' : '-';
      if (myData) {
        document.getElementById('my-questions').textContent = myData.totalQuestions;
        document.getElementById('my-login-days').textContent = myData.loginDays;
      }

      var tbody = document.getElementById('ranking-body');
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="padding:24px">まだ参加者がいません</td></tr>';
        return;
      }

      var html = '';
      students.forEach(function(s, idx) {
        var rank = idx + 1;
        var isMe = s.nickname === myNickname;
        var rankClass = '';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        html += '<tr' + (isMe ? ' class="is-me"' : '') + '>' +
          '<td><span class="rank-num ' + rankClass + '">' + rank + '</span></td>' +
          '<td class="rank-name">' + escapeHtml(s.nickname) + (isMe ? ' (自分)' : '') + '</td>' +
          '<td>' + s.totalQuestions + '</td>' +
          '<td>' + s.loginDays + '日</td>' +
          '<td>' + s.streak + '日</td>' +
          '<td>' + s.chips + '</td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
    }

    function escapeHtml(t) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(t));
      return d.innerHTML;
    }

    // --- ソート切り替え ---
    function applySort(sortKey) {
      currentSort = sortKey;
      if (lastStudents.length > 0) {
        renderRanking(lastStudents);
      } else {
        updateSortHeader();
        loadRanking();
      }
    }

    document.getElementById('sort-pills').addEventListener('click', function(e) {
      var btn = e.target.closest('button');
      if (!btn || !btn.dataset.sort) return;
      applySort(btn.dataset.sort);
    });

    document.getElementById('ranking-header').addEventListener('click', function(e) {
      var th = e.target.closest('th.sortable');
      if (!th || !th.dataset.sort) return;
      applySort(th.dataset.sort);
    });

    // --- 更新ボタン ---
    document.getElementById('refresh-btn').addEventListener('click', function() {
      localStorage.removeItem('rankingCache');
      localStorage.removeItem('rankingCacheTime');
      RS.syncToServer(function() { loadRanking(); });
      showToast('更新中...', '');
    });

    // --- 初期化 ---
    updateChipDisplay();
    checkSetup();
  })();
  </script>
</body>
</html>
